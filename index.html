<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carnet de films</title>
  <style>
    :root {
      --card: rgba(24, 8, 12, 0.92);
      --red: #b3001b;
      --red-bright: #ff123f;
      --text: #f5e9e9;
      --muted: #b9a1a1;
      --border: rgba(255, 18, 63, 0.35);
      --shadow: 0 0 24px rgba(255, 18, 63, 0.25);
      --gold: #ffcf33;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(179, 0, 27, 0.35), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(80, 0, 15, 0.4), transparent 35%),
        linear-gradient(135deg, #050203 0%, #120508 55%, #020202 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.35;
    }

    .app {
      width: min(1250px, calc(100% - 32px));
      margin: 32px auto;
      position: relative;
    }

    header {
      padding: 32px 24px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(35, 9, 14, 0.95), rgba(12, 4, 6, 0.92));
      box-shadow: var(--shadow), inset 0 0 30px rgba(179, 0, 27, 0.12);
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.6rem);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 8px var(--red-bright), 0 0 28px var(--red), 4px 4px 0 #260006;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .stat-card {
      padding: 12px;
      border: 1px solid rgba(255, 18, 63, 0.28);
      border-radius: 16px;
      background: rgba(0,0,0,.25);
      text-align: left;
    }

    .stat-card span {
      display: block;
      color: var(--muted);
      font-size: .78rem;
      margin-bottom: 5px;
    }

    .stat-card strong { color: #fff; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(11, 3, 5, 0.88);
      box-shadow: 0 0 20px rgba(179, 0, 27, 0.12);
    }

    .left-tools, .right-tools {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tabs-group {
      display: flex;
      gap: 10px;
      padding: 6px;
      border: 1px solid rgba(255, 18, 63, 0.38);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.35);
      box-shadow: inset 0 0 18px rgba(255, 18, 63, 0.12);
    }

    .tabs-group button { min-width: 90px; }

    .add-separator {
      width: 1px;
      height: 36px;
      background: linear-gradient(transparent, rgba(255, 18, 63, 0.75), transparent);
      margin: 0 6px;
    }

    button, input, select, textarea { font-family: inherit; }

    button {
      border: 1px solid rgba(255, 18, 63, 0.55);
      background: linear-gradient(180deg, #2a060c, #120306);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255, 18, 63, 0.12);
      transition: 0.18s ease;
    }

    button:hover, button.active {
      border-color: var(--red-bright);
      color: #fff;
      box-shadow: 0 0 18px rgba(255, 18, 63, 0.45);
      transform: translateY(-1px);
    }

    #addBtn {
      border-color: rgba(255, 207, 51, 0.55);
      box-shadow: 0 0 16px rgba(255, 207, 51, 0.12);
    }

    .danger-btn { background: linear-gradient(180deg, #760012, #250005); }

    .search {
      min-width: 260px;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 18, 63, 0.4);
      background: #0d0507;
      color: var(--text);
      outline: none;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: auto;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    thead {
      background: linear-gradient(180deg, #36000a, #160307);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th, td {
      padding: 13px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: #fff;
      text-shadow: 0 0 8px rgba(255, 18, 63, 0.5);
      user-select: none;
      white-space: nowrap;
    }

    .sort-label {
      cursor: pointer;
      padding: 4px 2px;
      border-radius: 6px;
    }

    .sort-label:hover { color: var(--red-bright); }

    .sort-arrow {
      display: inline-block;
      width: 18px;
      margin-left: 4px;
      color: var(--gold);
      text-shadow: 0 0 8px rgba(255, 207, 51, 0.45);
    }

    tbody tr { cursor: pointer; transition: 0.15s ease; }

    tbody tr:hover {
      background: rgba(179, 0, 27, 0.18);
      box-shadow: inset 4px 0 0 var(--red-bright);
    }

    .cover-thumb {
      width: 46px;
      height: 68px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 10px rgba(255, 18, 63, 0.2);
    }

    .no-cover {
      width: 46px;
      height: 68px;
      border-radius: 8px;
      border: 1px dashed rgba(255,255,255,0.2);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 0.7rem;
      text-align: center;
    }

    .filter-btn {
      display: inline-grid;
      place-items: center;
      width: 23px;
      height: 23px;
      padding: 0;
      margin-left: 6px;
      border-radius: 6px;
      font-size: 0.8rem;
    }

    .filter-menu {
      position: fixed;
      display: none;
      z-index: 50;
      width: 250px;
      max-height: 330px;
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #100407;
      box-shadow: 0 0 28px rgba(255, 18, 63, 0.35);
    }

    .filter-menu label {
      display: block;
      margin: 8px 0;
      color: var(--text);
      font-size: 0.88rem;
    }

    .preview {
      position: fixed;
      display: none;
      z-index: 100;
      width: 190px;
      max-height: 280px;
      border-radius: 14px;
      border: 1px solid rgba(255, 18, 63, 0.7);
      box-shadow: 0 0 30px rgba(255, 18, 63, 0.55);
      object-fit: cover;
      pointer-events: none;
      background: #000;
    }

    dialog {
      width: min(850px, calc(100% - 26px));
      border: 1px solid var(--border);
      border-radius: 22px;
      color: var(--text);
      background: linear-gradient(180deg, #18060a, #080203);
      box-shadow: 0 0 40px rgba(255, 18, 63, 0.38);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(3px);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .modal-head h2 { margin: 0; text-shadow: 0 0 12px var(--red-bright); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field.full { grid-column: 1 / -1; }

    label span, .field-title {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 18, 63, 0.35);
      background: #0c0305;
      color: var(--text);
      outline: none;
    }

    textarea { min-height: 90px; resize: vertical; }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) sepia(1) saturate(5) hue-rotate(310deg);
      cursor: pointer;
    }

    .stars { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; padding: 8px 0; }

    .star-wrap {
      position: relative;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 28px;
      line-height: 28px;
      color: #3a2528;
      text-shadow: 0 0 8px rgba(255, 18, 63, 0.12);
    }

    .star-fill {
      position: absolute;
      inset: 0;
      overflow: hidden;
      color: var(--gold);
      width: 0%;
      pointer-events: none;
    }

    .star-empty { position: absolute; inset: 0; }
    .rating-text { color: var(--muted); margin-left: 8px; font-size: 0.9rem; }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .empty { padding: 36px; text-align: center; color: var(--muted); }

    .tmdb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
    }

    .tmdb-choice {
      border-radius: 14px;
      padding: 8px;
      text-align: left;
      white-space: normal;
    }

    .tmdb-choice img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .details-line {
      color: var(--muted);
      font-size: .82rem;
      max-width: 260px;
    }

    /* Version mobile : le tableau devient une liste de cartes */
    @media (max-width: 760px) {
      body {
        overflow-x: hidden;
      }

      .app {
        width: min(100% - 18px, 1250px);
        margin: 12px auto 28px;
      }

      header {
        padding: 22px 14px;
        border-radius: 18px;
      }

      h1 {
        font-size: clamp(1.8rem, 11vw, 3rem);
        letter-spacing: 1px;
      }

      .stats-bar {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat-card {
        padding: 10px;
        border-radius: 14px;
      }

      .toolbar {
        padding: 10px;
        border-radius: 16px;
      }

      .left-tools,
      .right-tools {
        width: 100%;
      }

      .tabs-group {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .tabs-group button,
      #addBtn,
      #resetFiltersBtn {
        width: 100%;
      }

      .add-separator {
        display: none;
      }

      .search {
        width: 100%;
        min-width: 0;
      }

      .table-wrap {
        border: none;
        background: transparent;
        box-shadow: none;
        overflow: visible;
      }

      table,
      thead,
      tbody,
      tr,
      th,
      td {
        display: block;
        width: 100%;
      }

      table {
        min-width: 0;
        border-collapse: separate;
      }

      thead {
        display: none;
      }

      tbody {
        display: grid;
        gap: 14px;
      }

      tbody tr {
        position: relative;
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 10px 14px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(24, 8, 12, 0.95), rgba(10, 3, 5, 0.95));
        box-shadow: 0 0 18px rgba(255, 18, 63, 0.16);
      }

      tbody tr:hover {
        background: linear-gradient(180deg, rgba(35, 8, 14, 0.98), rgba(12, 4, 6, 0.98));
        box-shadow: 0 0 22px rgba(255, 18, 63, 0.28);
      }

      tbody tr td {
        padding: 0;
        border: none;
      }

      tbody tr td[data-label="Cover"] {
        grid-row: 1 / span 6;
      }

      tbody tr td[data-label="Cover"]::before {
        display: none;
      }

      tbody tr td[data-label="Cover"] .cover-thumb,
      tbody tr td[data-label="Cover"] .no-cover {
        width: 82px;
        height: 122px;
        border-radius: 12px;
      }

      tbody tr td[data-label="Titre"] {
        font-size: 1.05rem;
        font-weight: bold;
        color: #fff;
      }

      tbody tr td[data-label="Titre"]::before {
        display: none;
      }

      tbody tr td:not([data-label="Cover"]):not([data-label="Titre"]) {
        display: grid;
        grid-template-columns: 115px 1fr;
        gap: 8px;
        align-items: start;
        font-size: 0.9rem;
        color: var(--text);
      }

      tbody tr td:not([data-label="Cover"]):not([data-label="Titre"])::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 0.78rem;
      }

      .empty {
        display: block;
        grid-column: 1 / -1;
        padding: 26px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(24, 8, 12, 0.9);
      }

      .filter-btn,
      .sort-label,
      .sort-arrow {
        display: none;
      }

      dialog {
        width: min(100% - 18px, 850px);
        max-height: 92vh;
        overflow: auto;
        border-radius: 18px;
        padding: 14px;
      }

      .modal-head {
        position: sticky;
        top: -14px;
        z-index: 4;
        padding: 8px 0 12px;
        background: linear-gradient(180deg, #18060a, #080203);
      }

      .modal-head h2 {
        font-size: 1.2rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .modal-actions {
        position: sticky;
        bottom: -14px;
        background: linear-gradient(0deg, #080203, rgba(8, 2, 3, 0.92));
        padding-top: 12px;
      }

      .modal-actions > div {
        display: flex;
        gap: 10px;
        width: 100%;
      }

      .modal-actions button {
        flex: 1;
      }

      .tmdb-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview {
        display: none !important;
      }
    }


    @media (max-width: 720px) {
      .form-grid { grid-template-columns: 1fr; }
      .search { min-width: 100%; }
      .toolbar { align-items: stretch; }
      .left-tools, .right-tools { width: 100%; }
      button { flex: 1; }
      .tabs-group { width: 100%; }
      .add-separator { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Carnet de films</h1>
      <div id="syncStatus" style="margin-top:10px;color:var(--muted);font-size:0.85rem;">Connexion à Firebase...</div>
      <div id="statsBar" class="stats-bar"></div>
    </header>

    <nav class="toolbar">
      <div class="left-tools">
        <div class="tabs-group" aria-label="Onglets du carnet">
          <button id="tabVu" class="active" type="button">Vu</button>
          <button id="tabAVoir" type="button">A voir</button>
        </div>
        <div class="add-separator" aria-hidden="true"></div>
        <button id="addBtn" type="button">Ajouter</button>
      </div>
      <div class="right-tools">
        <input id="searchInput" class="search" type="search" placeholder="Rechercher titre, réalisateur, acteur..." />
        <button id="resetFiltersBtn" class="danger-btn" type="button">Réinitialiser tous les filtres</button>
      </div>
    </nav>

    <main class="table-wrap" id="tableContainer"></main>
  </div>

  <div id="filterMenu" class="filter-menu"></div>
  <img id="coverPreview" class="preview" alt="Aperçu de la cover" />

  <dialog id="filmDialog">
    <form method="dialog" id="filmForm">
      <div class="modal-head">
        <h2 id="modalTitle">Ajouter un film</h2>
        <button type="button" id="closeModalBtn">Fermer</button>
      </div>

      <div class="form-grid">
        <div class="field full" id="tmdbSearchBox" style="display:grid; gap:10px; margin-bottom:8px;">
          <div style="display:flex; gap:10px; align-items:end; flex-wrap:wrap;">
            <div style="flex:1; min-width:220px;">
              <span class="field-title">Recherche automatique TMDB</span>
              <button type="button" id="fetchCoverBtn" style="width:100%;">Chercher un film automatiquement</button>
            </div>
            <div id="tmdbStatus" class="details-line"></div>
          </div>
          <div id="tmdbResults" class="tmdb-grid" style="display:none;"></div>
        </div>

        <label class="field">
          <span>Titre</span>
          <input id="titleInput" required />
        </label>

        <label class="field">
          <span>Réalisateur</span>
          <input id="directorInput" />
        </label>

        <label class="field">
          <span>Genre</span>
          <input id="genreInput" placeholder="Slasher, found footage, possession..." />
        </label>

        <label class="field">
          <span>Date de sortie</span>
          <input id="releaseDateInput" type="date" />
        </label>

        <label class="field" id="watchDateField">
          <span>Date de visionnage</span>
          <input id="watchDateInput" type="date" />
        </label>

        <label class="field">
          <span>Catégorie</span>
          <select id="categoryInput">
            <option value="Vu">Vu</option>
            <option value="A voir">A voir</option>
          </select>
        </label>

        <label class="field">
          <span>Cover</span>
          <input id="coverInput" type="file" accept="image/*" />
        </label>

        <label class="field">
          <span>Acteurs principaux</span>
          <input id="actorsInput" placeholder="Acteurs principaux" />
        </label>

        <label class="field full">
          <span>Résumé</span>
          <textarea id="overviewInput" placeholder="Résumé du film"></textarea>
        </label>

        <div class="field full" id="ratingField">
          <span class="field-title">Note</span>
          <div class="stars" id="stars"></div>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" id="deleteBtn" class="danger-btn">Supprimer</button>
        <div>
          <button type="button" id="cancelBtn">Annuler</button>
          <button type="submit">Enregistrer</button>
        </div>
      </div>
    </form>
  </dialog>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      setDoc,
      deleteDoc,
      doc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9FZWQIVnjmIymK-Dc5x0MyPlbNMr0kj0",
      authDomain: "carnet-films.firebaseapp.com",
      projectId: "carnet-films",
      storageBucket: "carnet-films.firebasestorage.app",
      messagingSenderId: "59752649700",
      appId: "1:59752649700:web:1e4c809b4a0fbf4c822df1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const filmsCollection = collection(db, "films");

    const TMDB_API_KEY = "e859b9c9246453cc5aed971926007836";
    const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

    let films = [];
    let activeTab = "Vu";
    let editingId = null;
    let currentRating = 0;
    let filters = {};
    let sortState = { column: null, direction: null };
    let openedFilterColumn = null;

    const columnsByTab = {
      "Vu": ["Cover", "Titre", "Réalisateur", "Genre", "Date de sortie", "Date de visionnage", "Note"],
      "A voir": ["Cover", "Titre", "Réalisateur", "Genre", "Date de sortie"]
    };

    const tableContainer = document.getElementById("tableContainer");
    const filterMenu = document.getElementById("filterMenu");
    const coverPreview = document.getElementById("coverPreview");
    const dialog = document.getElementById("filmDialog");
    const form = document.getElementById("filmForm");
    const statsBar = document.getElementById("statsBar");
    const syncStatus = document.getElementById("syncStatus");

    const titleInput = document.getElementById("titleInput");
    const directorInput = document.getElementById("directorInput");
    const genreInput = document.getElementById("genreInput");
    const releaseDateInput = document.getElementById("releaseDateInput");
    const watchDateInput = document.getElementById("watchDateInput");
    const watchDateField = document.getElementById("watchDateField");
    const categoryInput = document.getElementById("categoryInput");
    const coverInput = document.getElementById("coverInput");
    const actorsInput = document.getElementById("actorsInput");
    const overviewInput = document.getElementById("overviewInput");
    const ratingField = document.getElementById("ratingField");
    const deleteBtn = document.getElementById("deleteBtn");
    const modalTitle = document.getElementById("modalTitle");
    const tmdbStatus = document.getElementById("tmdbStatus");
    const tmdbResults = document.getElementById("tmdbResults");

    onSnapshot(filmsCollection, snapshot => {
      films = snapshot.docs.map(document => migrateFilm({ id: document.id, ...document.data() }));
      syncStatus.textContent = "Synchronisé avec Firebase";
      renderTable();
      renderStats();
    }, error => {
      console.error(error);
      syncStatus.textContent = "Erreur Firebase : vérifie les règles Firestore";
    });

    function migrateFilm(film) {
      return {
        id: film.id || uid(),
        title: film.title || "",
        director: film.director || "",
        genre: film.genre || "",
        releaseDate: film.releaseDate || film.date || "",
        watchDate: film.watchDate || (film.category === "Vu" ? film.date || "" : ""),
        rating: Number(film.rating || 0),
        category: film.category || "Vu",
        cover: film.cover || "",
        actors: film.actors || "",
        overview: film.overview || "",
        tmdbId: film.tmdbId || null
      };
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function formatDate(value) {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      return year && month && day ? `${day}/${month}/${year}` : value;
    }

    function yearFromDate(value) {
      return value ? Number(value.slice(0, 4)) : 0;
    }

    function normalizeColumn(column) {
      if (column === "Date de sortie") return "releaseDate";
      if (column === "Date de visionnage") return "watchDate";
      return column;
    }

    function filmValue(film, column) {
      const normalized = normalizeColumn(column);
      if (normalized === "Cover") return film.cover ? "Avec cover" : "Sans cover";
      if (normalized === "Titre") return film.title || "";
      if (normalized === "Réalisateur") return film.director || "";
      if (normalized === "Genre") return film.genre || "";
      if (normalized === "releaseDate") return formatDate(film.releaseDate) || "";
      if (normalized === "watchDate") return formatDate(film.watchDate) || "";
      if (normalized === "Note") return film.rating ? `${film.rating}/5` : "";
      return "";
    }

    function getVisibleFilms() {
      const search = document.getElementById("searchInput").value.trim().toLowerCase();
      const result = films.filter(film => {
        if (film.category !== activeTab) return false;
        const haystack = `${film.title} ${film.director} ${film.genre} ${film.actors}`.toLowerCase();
        if (search && !haystack.includes(search)) return false;
        return Object.entries(filters).every(([column, allowed]) => {
          if (!allowed || allowed.length === 0) return true;
          return allowed.includes(filmValue(film, column));
        });
      });

      if (sortState.column && sortState.direction) {
        result.sort((a, b) => {
          let av = filmValue(a, sortState.column);
          let bv = filmValue(b, sortState.column);

          if (normalizeColumn(sortState.column) === "releaseDate") {
            av = a.releaseDate || "";
            bv = b.releaseDate || "";
          }
          if (normalizeColumn(sortState.column) === "watchDate") {
            av = a.watchDate || "";
            bv = b.watchDate || "";
          }
          if (normalizeColumn(sortState.column) === "Note") {
            av = Number(a.rating || 0);
            bv = Number(b.rating || 0);
            return sortState.direction === "asc" ? av - bv : bv - av;
          }

          const comparison = String(av).localeCompare(String(bv), "fr", { numeric: true, sensitivity: "base" });
          return sortState.direction === "asc" ? comparison : -comparison;
        });
      }
      return result;
    }

    function renderStats() {
      const viewed = films.filter(f => f.category === "Vu");
      const watchlist = films.filter(f => f.category === "A voir");
      const avg = viewed.length ? (viewed.reduce((sum, f) => sum + Number(f.rating || 0), 0) / viewed.length).toFixed(1) : "0.0";
      const topFilm = viewed.filter(f => f.rating).sort((a,b) => b.rating - a.rating)[0];
      const genreTop = topCount(viewed.flatMap(f => (f.genre || "").split(",").map(g => g.trim()).filter(Boolean)));
      const decadeTop = topCount(viewed.map(f => yearFromDate(f.releaseDate)).filter(Boolean).map(y => `${Math.floor(y / 10) * 10}s`));

      statsBar.innerHTML = `
        <div class="stat-card"><span>Films vus</span><strong>${viewed.length}</strong></div>
        <div class="stat-card"><span>A voir</span><strong>${watchlist.length}</strong></div>
        <div class="stat-card"><span>Note moyenne</span><strong>${avg}/5</strong></div>
        <div class="stat-card"><span>Top film</span><strong>${topFilm ? `${escapeHTML(topFilm.title)} (${topFilm.rating}/5)` : "Aucun"}</strong></div>
        <div class="stat-card"><span>Genre favori</span><strong>${genreTop || "Aucun"}</strong></div>
        <div class="stat-card"><span>Décennie favorite</span><strong>${decadeTop || "Aucune"}</strong></div>
      `;
    }

    function topCount(items) {
      const map = {};
      items.forEach(item => map[item] = (map[item] || 0) + 1);
      const top = Object.entries(map).sort((a,b) => b[1] - a[1])[0];
      return top ? `${top[0]} (${top[1]})` : "";
    }

    function renderTable() {
      const columns = columnsByTab[activeTab];
      const visibleFilms = getVisibleFilms();

      let html = `<table><thead><tr>`;
      columns.forEach(column => {
        const arrow = sortState.column === column && sortState.direction ? (sortState.direction === "asc" ? "▲" : "▼") : "";
        html += `<th><span class="sort-label" data-sort="${column}">${column}<span class="sort-arrow">${arrow}</span></span><button class="filter-btn" type="button" data-filter="${column}">▾</button></th>`;
      });
      html += `</tr></thead><tbody>`;

      if (visibleFilms.length === 0) {
        html += `<tr><td colspan="${columns.length}" class="empty">Aucun film dans cet onglet.</td></tr>`;
      } else {
        visibleFilms.forEach(film => {
          html += `<tr data-id="${film.id}">`;
          columns.forEach(column => {
            if (column === "Cover") {
              html += `<td data-label="${column}">${film.cover ? `<img class="cover-thumb" src="${film.cover}" alt="Cover de ${escapeHTML(film.title)}">` : `<div class="no-cover">No cover</div>`}</td>`;
            } else {
              html += `<td data-label="${column}">${escapeHTML(filmValue(film, column))}</td>`;
            }
          });
          html += `</tr>`;
        });
      }
      html += `</tbody></table>`;
      tableContainer.innerHTML = html;
    }

    function renderStars() {
      const stars = document.getElementById("stars");
      stars.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const wrap = document.createElement("div");
        wrap.className = "star-wrap";
        const fillPercent = Math.max(0, Math.min(1, currentRating - (i - 1))) * 100;
        wrap.innerHTML = `<span class="star-empty">★</span><span class="star-fill" style="width:${fillPercent}%">★</span>`;
        wrap.addEventListener("mousemove", e => {
          const rect = wrap.getBoundingClientRect();
          currentRating = i - 1 + (e.clientX - rect.left < rect.width / 2 ? 0.5 : 1);
          renderStars();
        });
        wrap.addEventListener("click", e => {
          const rect = wrap.getBoundingClientRect();
          currentRating = i - 1 + (e.clientX - rect.left < rect.width / 2 ? 0.5 : 1);
          renderStars();
        });
        stars.appendChild(wrap);
      }
      const txt = document.createElement("span");
      txt.className = "rating-text";
      txt.textContent = currentRating ? `${currentRating}/5` : "Aucune note";
      stars.appendChild(txt);
    }

    function openModal(film = null) {
      editingId = film?.id || null;
      modalTitle.textContent = film ? "Modifier le film" : "Ajouter un film";
      deleteBtn.style.display = film ? "inline-block" : "none";

      titleInput.value = film?.title || "";
      directorInput.value = film?.director || "";
      genreInput.value = film?.genre || "";
      releaseDateInput.value = film?.releaseDate || "";
      watchDateInput.value = film?.watchDate || "";
      categoryInput.value = film?.category || activeTab;
      actorsInput.value = film?.actors || "";
      overviewInput.value = film?.overview || "";
      currentRating = film?.rating || 0;
      coverInput.value = "";
      coverInput.dataset.tmdbCover = film?.cover || "";
      tmdbStatus.textContent = "";
      tmdbResults.style.display = "none";
      tmdbResults.innerHTML = "";
      updateCategoryFields();
      renderStars();
      dialog.showModal();
    }

    function updateCategoryFields() {
      const isViewed = categoryInput.value === "Vu";
      ratingField.style.display = isViewed ? "block" : "none";
      watchDateField.style.display = isViewed ? "block" : "none";
    }

    async function fetchJSON(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error("Erreur réseau TMDB");
      return response.json();
    }

    async function applyTMDBMovie(movie) {
      tmdbStatus.textContent = "Récupération des infos...";
      const details = await fetchJSON(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&language=fr-FR&append_to_response=credits`);

      titleInput.value = details.title || movie.title || titleInput.value;
      releaseDateInput.value = details.release_date || movie.release_date || "";
      overviewInput.value = details.overview || "";
      genreInput.value = (details.genres || []).map(g => g.name).join(", ");
      directorInput.value = details.credits?.crew?.find(p => p.job === "Director")?.name || "";
      actorsInput.value = (details.credits?.cast || []).slice(0, 5).map(p => p.name).join(", ");

      if (details.poster_path || movie.poster_path) {
        coverInput.dataset.tmdbCover = `${TMDB_IMAGE_BASE}${details.poster_path || movie.poster_path}`;
        tmdbStatus.textContent = `Film sélectionné : ${details.title || movie.title}`;
      } else {
        coverInput.dataset.tmdbCover = "";
        tmdbStatus.textContent = "Infos trouvées, mais aucune cover disponible.";
      }
    }

    async function fetchTMDBCover() {
      const title = titleInput.value.trim();
      if (!title) {
        tmdbStatus.textContent = "Entre un titre avant la recherche.";
        return;
      }

      tmdbStatus.textContent = "Recherche en cours...";
      tmdbResults.style.display = "none";
      tmdbResults.innerHTML = "";

      try {
        const data = await fetchJSON(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}&language=fr-FR`);
        const results = (data.results || []).filter(movie => movie.poster_path || movie.release_date).slice(0, 10);

        if (results.length === 0) {
          tmdbStatus.textContent = "Aucun résultat trouvé.";
          return;
        }

        tmdbStatus.textContent = "Choisis le bon film :";
        tmdbResults.style.display = "grid";
        tmdbResults.innerHTML = results.map((movie, index) => `
          <button type="button" class="tmdb-choice" data-index="${index}">
            ${movie.poster_path ? `<img src="${TMDB_IMAGE_BASE}${movie.poster_path}" alt="${escapeHTML(movie.title)}">` : `<div class="no-cover" style="width:100%; height:150px; margin-bottom:8px;">No cover</div>`}
            <strong>${escapeHTML(movie.title)}</strong><br>
            <span class="details-line">${movie.release_date ? movie.release_date.slice(0, 4) : "Date inconnue"}</span>
          </button>
        `).join("");

        tmdbResults.querySelectorAll(".tmdb-choice").forEach(button => {
          button.addEventListener("click", async () => {
            const movie = results[Number(button.dataset.index)];
            tmdbResults.style.display = "none";
            tmdbResults.innerHTML = "";
            await applyTMDBMovie(movie);
          });
        });
      } catch (error) {
        console.error(error);
        tmdbStatus.textContent = "Erreur TMDB.";
      }
    }

    function closeModal() {
      dialog.close();
      form.reset();
      editingId = null;
      currentRating = 0;
    }

    function getCoverData(existingCover) {
      return new Promise(resolve => {
        const file = coverInput.files[0];
        if (!file) return resolve(coverInput.dataset.tmdbCover || existingCover || "");
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    async function submitFilm(event) {
      event.preventDefault();
      syncStatus.textContent = "Sauvegarde en cours...";

      const existing = films.find(f => f.id === editingId);
      const category = categoryInput.value;
      const cover = await getCoverData(existing?.cover);

      const data = {
        title: titleInput.value.trim(),
        director: directorInput.value.trim(),
        genre: genreInput.value.trim(),
        releaseDate: releaseDateInput.value,
        watchDate: category === "Vu" ? watchDateInput.value : "",
        rating: category === "Vu" ? currentRating : 0,
        category,
        cover,
        actors: actorsInput.value.trim(),
        overview: overviewInput.value.trim(),
        tmdbId: existing?.tmdbId || null,
        updatedAt: serverTimestamp()
      };

      if (editingId) {
        await setDoc(doc(db, "films", editingId), data, { merge: true });
      } else {
        await addDoc(filmsCollection, { ...data, createdAt: serverTimestamp() });
      }

      activeTab = category;
      document.getElementById("tabVu").classList.toggle("active", activeTab === "Vu");
      document.getElementById("tabAVoir").classList.toggle("active", activeTab === "A voir");
      closeModal();
    }

    async function deleteCurrentFilm() {
      if (!editingId) return;
      if (!confirm("Supprimer ce film ?")) return;
      await deleteDoc(doc(db, "films", editingId));
      closeModal();
    }

    function openFilterMenu(column, button) {
      if (openedFilterColumn === column && filterMenu.style.display === "block") {
        filterMenu.style.display = "none";
        openedFilterColumn = null;
        return;
      }

      openedFilterColumn = column;
      const values = [...new Set(films.filter(f => f.category === activeTab).map(f => filmValue(f, column)).filter(Boolean))].sort((a,b) => a.localeCompare(b, "fr"));
      const selected = filters[column] || [];
      filterMenu.innerHTML = `
        <strong>Filtrer : ${column}</strong>
        <label><input type="checkbox" data-all checked> Tous</label>
        <hr style="border-color:rgba(255,255,255,.12)">
        ${values.map(v => `<label><input type="checkbox" value="${escapeAttr(v)}" ${selected.length === 0 || selected.includes(v) ? "checked" : ""}> ${escapeHTML(v)}</label>`).join("")}
      `;

      const rect = button.getBoundingClientRect();
      filterMenu.style.left = `${Math.min(rect.left, window.innerWidth - 270)}px`;
      filterMenu.style.top = `${rect.bottom + 8}px`;
      filterMenu.style.display = "block";

      filterMenu.querySelectorAll("input:not([data-all])").forEach(input => {
        input.addEventListener("change", () => {
          const checked = [...filterMenu.querySelectorAll("input:not([data-all]):checked")].map(i => i.value);
          filters[column] = checked.length === values.length ? [] : checked;
          renderTable();
        });
      });

      filterMenu.querySelector("[data-all]").addEventListener("change", e => {
        if (e.target.checked) {
          delete filters[column];
          filterMenu.style.display = "none";
          openedFilterColumn = null;
          renderTable();
        }
      });
    }

    function resetFilters() {
      filters = {};
      sortState = { column: null, direction: null };
      openedFilterColumn = null;
      document.getElementById("searchInput").value = "";
      filterMenu.style.display = "none";
    }

    function escapeHTML(value) {
      return String(value || "").replace(/[&<>'"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));
    }

    function escapeAttr(value) { return escapeHTML(value); }

    document.getElementById("tabVu").addEventListener("click", () => {
      activeTab = "Vu";
      resetFilters();
      document.getElementById("tabVu").classList.add("active");
      document.getElementById("tabAVoir").classList.remove("active");
      renderTable();
    });

    document.getElementById("tabAVoir").addEventListener("click", () => {
      activeTab = "A voir";
      resetFilters();
      document.getElementById("tabAVoir").classList.add("active");
      document.getElementById("tabVu").classList.remove("active");
      renderTable();
    });

    document.getElementById("addBtn").addEventListener("click", () => openModal());
    document.getElementById("fetchCoverBtn").addEventListener("click", fetchTMDBCover);
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("deleteBtn").addEventListener("click", deleteCurrentFilm);
    document.getElementById("searchInput").addEventListener("input", renderTable);
    document.getElementById("resetFiltersBtn").addEventListener("click", () => { resetFilters(); renderTable(); });

    categoryInput.addEventListener("change", updateCategoryFields);
    form.addEventListener("submit", submitFilm);

    tableContainer.addEventListener("click", e => {
      const filterButton = e.target.closest("[data-filter]");
      if (filterButton) {
        e.stopPropagation();
        openFilterMenu(filterButton.dataset.filter, filterButton);
        return;
      }

      const sortLabel = e.target.closest("[data-sort]");
      if (sortLabel) {
        e.stopPropagation();
        const column = sortLabel.dataset.sort;
        if (sortState.column !== column) sortState = { column, direction: "asc" };
        else if (sortState.direction === "asc") sortState = { column, direction: "desc" };
        else sortState = { column: null, direction: null };
        renderTable();
        return;
      }

      const row = e.target.closest("tr[data-id]");
      if (!row) return;
      const film = films.find(f => f.id === row.dataset.id);
      if (film) openModal(film);
    });

    tableContainer.addEventListener("mousemove", e => {
      const img = e.target.closest(".cover-thumb");
      if (!img) {
        coverPreview.style.display = "none";
        return;
      }
      coverPreview.src = img.src;
      coverPreview.style.display = "block";
      coverPreview.style.left = `${Math.min(e.clientX + 18, window.innerWidth - 210)}px`;
      coverPreview.style.top = `${Math.min(e.clientY + 18, window.innerHeight - 300)}px`;
    });

    tableContainer.addEventListener("mouseleave", () => coverPreview.style.display = "none");

    document.addEventListener("click", e => {
      if (!filterMenu.contains(e.target) && !e.target.closest("[data-filter]")) {
        filterMenu.style.display = "none";
        openedFilterColumn = null;
      }
    });

    renderTable();
    renderStats();
  </script>
</body>
</html>
