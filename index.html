<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="512x512" href="/carnet-films/favicon.png?v=22">
  <meta name="theme-color" content="#090304">

  <title>Carnet de films d'Horreur</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050102;
      --panel: rgba(15, 5, 8, 0.75);
      --card: rgba(20, 5, 8, 0.6);
      --red: #8b0017;
      --red2: #d9092d;
      --red3: #ff173f;
      --blood: #660000;
      --gold: #b38b59;
      --gold2: #dfba82;
      --text: #eaeaea;
      --muted: #a39598;
      --line: rgba(217, 9, 45, 0.25);
      --glow: 0 0 20px rgba(217, 9, 45, 0.4);
      
      --font-heading: 'Cinzel', serif;
      --font-body: 'Montserrat', sans-serif;
    }

    * { box-sizing: border-box; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: var(--blood); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--red2); }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-body);
      /* Image de fond sombre (brouillard/cinéma) avec gradient superposé */
      background-color: var(--bg);
      background-image: 
        linear-gradient(135deg, rgba(5,1,2,0.95) 0%, rgba(20,2,5,0.85) 50%, rgba(2,1,2,0.95) 100%),
        url('https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* Effet "grain de film" subtil */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png');
      opacity: 0.04;
      mix-blend-mode: overlay;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1380px, calc(100% - 40px));
      margin: 40px auto;
      display: block;
    }

    h1, h2, h3, .section-title {
      font-family: var(--font-heading);
    }

    .main {
      width: 100%;
      display: grid;
      gap: 24px;
    }

    .hero {
      width: 100%;
      position: relative;
      min-height: 250px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 50px rgba(217,9,45,.05);
      padding: 40px 34px 30px;
      text-align: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--red3), transparent);
    }

    h1 {
      margin: 10px 0 0;
      color: #fff;
      font-size: clamp(2.5rem, 5vw, 5rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 5px 15px rgba(255, 23, 63, 0.8), 2px 2px 0px #4a000d;
      font-weight: 900;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--gold2);
      letter-spacing: 6px;
      text-transform: uppercase;
      font-size: clamp(.8rem, 1.5vw, 1.1rem);
      font-family: var(--font-heading);
    }

    #syncStatus {
      margin-top: 15px;
      color: var(--muted);
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stats {
      margin-top: 35px;
      display: flex !important;
      flex-wrap: nowrap !important;
      gap: 16px;
      width: 100%;
      overflow-x: auto;
      align-items: stretch;
      padding-bottom: 10px;
    }

    .stat {
      flex: 1 1 0;
      min-width: 180px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.4);
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      gap: 12px;
      padding: 16px;
      text-align: left;
      transition: all 0.3s ease;
    }
    .stat:hover {
      background: rgba(255, 23, 63, 0.05);
      border-color: rgba(255, 23, 63, 0.3);
      transform: translateY(-2px);
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: var(--red3);
      background: rgba(255,23,63,.1);
      font-size: 1.4rem;
    }

    .stat span {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: .7rem;
      font-weight: 600;
    }

    .stat strong {
      display: block;
      color: #fff;
      font-size: 1.6rem;
      margin-top: 4px;
      font-family: var(--font-heading);
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .toolbar {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .tabs {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }

    button {
      font-family: var(--font-heading);
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(25, 5, 8, 0.8);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }

    button:hover,
    button.active {
      color: #fff;
      border-color: var(--red3);
      background: linear-gradient(180deg, var(--red), #3a0008);
      box-shadow: var(--glow);
    }

    .tabs button {
      border: 0;
      border-radius: 0;
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .tabs button:last-child { border-right: none; }

    .search, .year-filter {
      flex: 1;
      min-width: 200px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      padding: 12px 16px;
      outline: none;
      font-family: var(--font-body);
      transition: border-color 0.3s ease;
    }
    .search:focus, .year-filter:focus {
      border-color: var(--red3);
      background: rgba(0,0,0,0.8);
    }

    #addBtn {
      background: linear-gradient(180deg, var(--red2), var(--blood));
      border-color: var(--red3);
      text-transform: uppercase;
    }
    #addBtn:hover {
      box-shadow: 0 0 25px rgba(255,23,63,.6);
      transform: scale(1.02);
    }

    #resetFiltersBtn { display: none; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 24px;
      align-items: start;
    }

    .movie-area,
    .latest-panel {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      padding: 24px;
    }

    .section-title,
    .latest-panel h2 {
      margin: 0 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      font-size: 1.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .section-title::before { content: "🩸"; font-size: 1.2rem; }

    .section-title::after,
    .latest-panel h2::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--red3), transparent);
      opacity: 0.5;
    }

    .latest-panel h2 { font-size: 1.2rem; }
    .latest-panel h2::before { content: "💀"; font-size: 1rem; }

    table, thead, tbody, tr, th, td { display: block; }
    table { width: 100%; }
    thead { display: none; }

    tbody {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }

    tbody tr {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      position: relative;
    }

    /* Overlay sombre sur l'affiche qui s'éclaircit au hover */
    tbody tr::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 330px;
      background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 50%);
      z-index: 1;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    tbody tr:hover {
      transform: translateY(-8px) scale(1.03);
      border-color: var(--red3);
      box-shadow: 0 15px 30px rgba(0,0,0,0.8), 0 0 20px rgba(255,23,63,0.3);
      z-index: 2;
    }
    tbody tr:hover::before { opacity: 0.7; }

    tbody td {
      border: 0;
      padding: 0 16px;
      position: relative;
      z-index: 2;
    }

    tbody td[data-label="Cover"] {
      padding: 0;
      background: #000;
      height: 330px;
    }

    .cover-thumb,
    tbody td[data-label="Cover"] .no-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: grid;
      place-items: center;
      color: var(--muted);
      transition: transform 0.5s ease;
    }
    tbody tr:hover .cover-thumb {
      transform: scale(1.05);
    }

    tbody td[data-label="Titre"] {
      margin-top: -40px; /* Remonte le titre sur le gradient de l'image */
      padding-top: 0;
      padding-bottom: 10px;
      color: #fff;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      line-height: 1.2;
    }

    tbody td[data-label="Réalisateur"] {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    tbody td[data-label="Genre"],
    tbody td[data-label="Date de sortie"],
    tbody td[data-label="Date de visionnage"],
    tbody td[data-label="Catégorie"] {
      padding-top: 8px;
      font-size: 0.8rem;
      color: #ccc;
    }
    
    tbody td[data-label="Genre"] {
      color: var(--gold2);
      font-weight: 600;
    }

    tbody td[data-label="Date de visionnage"]::before {
      content: "👁️ Vu le : ";
      color: var(--muted);
    }

    tbody td[data-label="Note"] {
      padding-top: 15px;
      padding-bottom: 20px;
      color: var(--gold2);
      font-weight: bold;
      font-size: 1rem;
    }

    tbody td[data-label="Note"]::before {
      content: "★ ";
      color: var(--red3);
      font-size: 1.2rem;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 50px;
      text-align: center;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      color: var(--muted);
      background: rgba(0,0,0,0.3);
      font-style: italic;
    }

    .filter-btn, .sort-label, .sort-arrow { display: none; }

    #latestList { display: grid; gap: 16px; }

    .latest-item {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .latest-item:hover {
      border-color: var(--red3);
      background: rgba(255,23,63,.05);
      transform: translateX(5px);
    }

    .latest-item img, .latest-no-cover {
      width: 70px;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .latest-item strong {
      display: block;
      color: #fff;
      font-family: var(--font-heading);
      font-size: 1rem;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .latest-item span {
      display: block;
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.4;
    }

    .filter-menu, .preview { display: none !important; }

    dialog {
      width: min(900px, calc(100% - 40px));
      border: 1px solid var(--red3);
      border-radius: 16px;
      color: var(--text);
      background: rgba(15,2,5,0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 50px rgba(255,23,63,0.3), 0 20px 40px rgba(0,0,0,0.8);
      padding: 30px;
    }
    dialog::backdrop {
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(8px);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 15px;
    }
    .modal-head h2 { margin: 0; color: #fff; font-size: 1.8rem; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }
    .field.full { grid-column: 1 / -1; }

    label span, .field-title {
      display: block;
      margin-bottom: 8px;
      color: var(--gold2);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: .8rem;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 14px;
      outline: none;
      font-family: var(--font-body);
      transition: border-color 0.3s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--red3); }

    textarea { min-height: 120px; resize: vertical; }

    .stars {
      display: flex; gap: 5px; align-items: center; padding: 10px 0;
    }
    .star-wrap {
      position: relative; width: 35px; height: 35px; cursor: pointer;
      font-size: 35px; line-height: 35px; color: rgba(255,255,255,0.1);
    }
    .star-fill {
      position: absolute; inset: 0; overflow: hidden; color: var(--red3);
      width: 0%; pointer-events: none; text-shadow: 0 0 10px var(--red3);
    }
    .star-empty { position: absolute; inset: 0; }
    .rating-text { color: var(--muted); margin-left: 15px; font-weight: 600; }

    .modal-actions {
      display: flex; justify-content: space-between; margin-top: 30px;
    }
    .danger-btn { background: #330000; border-color: red; color: #ff6666; }
    .danger-btn:hover { background: red; color: white; }

    .tmdb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; }
    .tmdb-choice {
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px; text-align: left; transition: 0.3s;
    }
    .tmdb-choice:hover { border-color: var(--red3); transform: translateY(-3px); }
    .tmdb-choice img { width: 100%; aspect-ratio: 2 / 3; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }

    /* Advanced Stats Styling */
    .advanced-stats { display: grid; gap: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .stats-card {
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      background: rgba(0,0,0,0.5); padding: 20px;
    }
    .stats-card h3 { margin: 0 0 15px; color: var(--gold2); font-size: 1rem; text-transform: uppercase; }
    .stats-big { color: #fff; font-size: 2.5rem; font-family: var(--font-heading); text-shadow: 0 0 15px rgba(255,23,63,0.5); }
    .stats-list { display: grid; gap: 12px; }
    .stats-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: center; font-size: .9rem; }
    .stats-row strong { color: #fff; }
    .bar-track { grid-column: 1 / -1; height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--red3)); }
    .best-movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .best-movie { border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; background: #000; cursor: pointer; transition: 0.3s; }
    .best-movie:hover { border-color: var(--red3); transform: scale(1.05); }
    .best-movie img { width: 100%; aspect-ratio: 2 / 3; object-fit: cover; }
    .best-movie div:last-child { padding: 12px; }
    .best-movie strong { display: block; color: #fff; font-size: .9rem; margin-bottom: 5px; font-family: var(--font-heading); }

    /* Media Queries remain mostly similar for responsiveness, just updated padding/sizes */
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .latest-panel { display: none; }
    }
    @media (max-width: 760px) {
      .hero { padding: 20px 15px; min-height: auto; }
      h1 { font-size: 2.2rem; }
      .tabs { grid-template-columns: repeat(2, 1fr); display: grid; }
      tbody { grid-template-columns: 1fr; }
      tbody tr { display: grid; grid-template-columns: 100px minmax(0, 1fr); gap: 15px; padding: 10px; }
      tbody tr::before { display: none; }
      tbody td[data-label="Cover"], .cover-thumb { height: 150px; width: 100px; border-radius: 8px; }
      tbody td[data-label="Titre"] { margin-top: 5px; font-size: 1.1rem; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="page">
    
    <main class="main">
      <header class="hero">
        <h1>Carnet d'Horreur</h1>
        <div class="subtitle">Archives Cinématographiques</div>
        <div id="syncStatus">Connexion à Firebase...</div>

        <section class="stats" id="statsBar"></section>
      </header>

      <nav class="toolbar">
        <div class="tabs">
          <button id="tabTous" class="active" type="button">Tous</button>
          <button id="tabVu" type="button">Vus</button>
          <button id="tabAVoir" type="button">À voir</button>
          <button id="tabStats" type="button">Statistiques</button>
        </div>

        <input id="searchInput" class="search" type="search" placeholder="Rechercher une oeuvre..." />

        <select id="yearFilter" class="year-filter" title="Filtrer les films vus par année">
          <option value="Toutes">Toutes les années</option>
        </select>
        <select id="sortSelect" class="year-filter">
          <option value="">🩸 Trier par...</option>
          <option value="ratingDesc">Note ↓</option>
          <option value="ratingAsc">Note ↑</option>
          <option value="watchDesc">Visionnage récent</option>
          <option value="watchAsc">Visionnage ancien</option>
          <option value="releaseDesc">Sortie récente</option>
          <option value="releaseAsc">Sortie ancienne</option>
          <option value="titleAsc">Titre A-Z</option>
          <option value="titleDesc">Titre Z-A</option>
        </select>

        <button id="addBtn" type="button">+ Ajouter</button>
        <button id="resetFiltersBtn" type="button">Reset</button>
      </nav>

      <section class="layout">
        <section class="movie-area">
          <h2 class="section-title">La Collection</h2>
          <main class="table-wrap" id="tableContainer"></main>
        </section>

        <aside class="latest-panel">
          <h2>Derniers ajouts</h2>
          <div id="latestList"></div>
        </aside>
      </section>
    </main>
  </div>

  <div id="filterMenu" class="filter-menu"></div>
  <img id="coverPreview" class="preview" alt="Aperçu de la cover" />

  <dialog id="filmDialog">
    <form method="dialog" id="filmForm">
      <div class="modal-head">
        <h2 id="modalTitle">Ajouter une oeuvre</h2>
        <button type="button" id="closeModalBtn" style="background:transparent; border:1px solid #fff;">✕ Fermer</button>
      </div>

      <div class="form-grid">
        <div class="field full" id="tmdbSearchBox" style="display:grid; gap:10px; margin-bottom:8px;">
          <div style="display:flex; gap:10px; align-items:end; flex-wrap:wrap;">
            <div style="flex:1; min-width:220px;">
              <span class="field-title">Recherche TMDB (Base de données)</span>
              <button type="button" id="fetchCoverBtn" style="width:100%; background: #222;">🔍 Chercher un film automatiquement</button>
            </div>
            <div id="tmdbStatus" style="color:var(--gold2); font-size:0.85rem;"></div>
          </div>
          <div id="tmdbResults" class="tmdb-grid" style="display:none;"></div>
        </div>

        <label class="field">
          <span>Titre</span>
          <input id="titleInput" required />
        </label>

        <label class="field">
          <span>Réalisateur</span>
          <input id="directorInput" />
        </label>

        <label class="field">
          <span>Genre</span>
          <input id="genreInput" placeholder="Slasher, paranormal, gore..." />
        </label>

        <label class="field">
          <span>Date de sortie</span>
          <input id="releaseDateInput" type="date" />
        </label>

        <label class="field" id="watchDateField">
          <span>Date de visionnage</span>
          <input id="watchDateInput" type="date" />
        </label>

        <label class="field">
          <span>Catégorie</span>
          <select id="categoryInput">
            <option value="Vu">Vu</option>
            <option value="A voir">À voir</option>
          </select>
        </label>

        <label class="field">
          <span>Acteurs principaux</span>
          <input id="actorsInput" placeholder="Ex: Bruce Campbell..." />
        </label>

        <label class="field full">
          <span>Résumé</span>
          <textarea id="overviewInput" placeholder="L'histoire terrifiante de..."></textarea>
        </label>

        <div class="field full" id="ratingField">
          <span class="field-title">Note attribuée</span>
          <div class="stars" id="stars"></div>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" id="deleteBtn" class="danger-btn">Supprimer</button>
        <div style="display:flex; gap:10px;">
          <button type="button" id="cancelBtn" style="background:transparent; border:1px solid #fff;">Annuler</button>
          <button type="submit" style="background:var(--red3); color:#fff; border:none;">Enregistrer</button>
        </div>
      </div>
    </form>
  </dialog>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      setDoc,
      deleteDoc,
      doc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9FZWQIVnjmIymK-Dc5x0MyPlbNMr0kj0",
      authDomain: "carnet-films.firebaseapp.com",
      projectId: "carnet-films",
      storageBucket: "carnet-films.firebasestorage.app",
      messagingSenderId: "59752649700",
      appId: "1:59752649700:web:1e4c809b4a0fbf4c822df1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const filmsCollection = collection(db, "films");

    const TMDB_API_KEY = "e859b9c9246453cc5aed971926007836";
    const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

    let films = [];
    let activeTab = "Tous";
    let selectedYear = "Toutes";
    let customSort = "";
    let editingId = null;
    let currentRating = 0;
    let filters = {};
    let sortState = { column: null, direction: null };
    let openedFilterColumn = null;

    const columnsByTab = {
      "Tous": ["Cover", "Titre", "Réalisateur", "Genre", "Catégorie", "Date de sortie", "Date de visionnage", "Note"],
      "Vu": ["Cover", "Titre", "Réalisateur", "Genre", "Date de sortie", "Date de visionnage", "Note"],
      "A voir": ["Cover", "Titre", "Réalisateur", "Genre", "Date de sortie"]
    };

    const tableContainer = document.getElementById("tableContainer");
    const filterMenu = document.getElementById("filterMenu");
    const coverPreview = document.getElementById("coverPreview");
    const dialog = document.getElementById("filmDialog");
    const form = document.getElementById("filmForm");
    const statsBar = document.getElementById("statsBar");
    const syncStatus = document.getElementById("syncStatus");
    const latestList = document.getElementById("latestList");
    const yearFilter = document.getElementById("yearFilter");

    const titleInput = document.getElementById("titleInput");
    const directorInput = document.getElementById("directorInput");
    const genreInput = document.getElementById("genreInput");
    const releaseDateInput = document.getElementById("releaseDateInput");
    const watchDateInput = document.getElementById("watchDateInput");
    const watchDateField = document.getElementById("watchDateField");
    const categoryInput = document.getElementById("categoryInput");
    const coverInput = { dataset: {} };
    const actorsInput = document.getElementById("actorsInput");
    const overviewInput = document.getElementById("overviewInput");
    const ratingField = document.getElementById("ratingField");
    const deleteBtn = document.getElementById("deleteBtn");
    const modalTitle = document.getElementById("modalTitle");
    const tmdbStatus = document.getElementById("tmdbStatus");
    const tmdbResults = document.getElementById("tmdbResults");

    onSnapshot(filmsCollection, snapshot => {
      films = snapshot.docs.map(document => migrateFilm({ id: document.id, ...document.data() }));
      syncStatus.textContent = "Synchronisé avec la base de données";
      renderYearFilter();
      renderTable();
      renderStats();
      renderLatest();
    }, error => {
      console.error(error);
      syncStatus.textContent = "Erreur de connexion";
    });

    function migrateFilm(film) {
      return {
        id: film.id || uid(),
        title: film.title || "",
        director: film.director || "",
        genre: film.genre || "",
        releaseDate: film.releaseDate || film.date || "",
        watchDate: film.watchDate || (film.category === "Vu" ? film.date || "" : ""),
        rating: Number(film.rating || 0),
        category: film.category || "Vu",
        cover: film.cover || "",
        actors: film.actors || "",
        overview: film.overview || "",
        tmdbId: film.tmdbId || null,
        createdAt: film.createdAt || null
      };
    }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function formatDate(value) {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      return year && month && day ? `${day}/${month}/${year}` : value;
    }

    function yearFromDate(value) { return value ? Number(value.slice(0, 4)) : 0; }
    function yearFromWatchDate(film) { return film.watchDate ? film.watchDate.slice(0, 4) : ""; }

    function renderYearFilter() {
      if (!yearFilter) return;
      const viewedFilms = films.filter(film => film.category === "Vu" && film.watchDate);
      const counts = {};
      viewedFilms.forEach(film => {
        const year = yearFromWatchDate(film);
        if (!year) return;
        counts[year] = (counts[year] || 0) + 1;
      });
      const years = Object.keys(counts).sort((a, b) => Number(b) - Number(a));
      const currentValue = selectedYear;
      yearFilter.innerHTML = `<option value="Toutes">Toutes les années (${viewedFilms.length})</option>` +
        years.map(year => `<option value="${year}">${year} (${counts[year]})</option>`).join("");
      selectedYear = years.includes(currentValue) ? currentValue : "Toutes";
      yearFilter.value = selectedYear;
    }

    function normalizeColumn(column) {
      if (column === "Date de sortie") return "releaseDate";
      if (column === "Date de visionnage") return "watchDate";
      return column;
    }

    function filmValue(film, column) {
      const normalized = normalizeColumn(column);
      if (normalized === "Cover") return film.cover ? "Avec cover" : "Sans cover";
      if (normalized === "Titre") return film.title || "";
      if (normalized === "Réalisateur") return film.director || "";
      if (normalized === "Genre") return film.genre || "";
      if (normalized === "Catégorie") return film.category === "Vu" ? "Vu" : "A voir";
      if (normalized === "releaseDate") return formatDate(film.releaseDate) || "";
      if (normalized === "watchDate") return formatDate(film.watchDate) || "";
      if (normalized === "Note") return film.rating ? `${film.rating}/5` : "";
      return "";
    }

    function getVisibleFilms() {
      const search = document.getElementById("searchInput").value.trim().toLowerCase();
      const result = films.filter(film => {
        if (activeTab !== "Tous" && film.category !== activeTab) return false;
        if (selectedYear !== "Toutes") {
          if (film.category !== "Vu") return false;
          if (yearFromWatchDate(film) !== selectedYear) return false;
        }
        const haystack = `${film.title} ${film.director} ${film.genre} ${film.actors}`.toLowerCase();
        if (search && !haystack.includes(search)) return false;
        return Object.entries(filters).every(([column, allowed]) => {
          if (!allowed || allowed.length === 0) return true;
          return allowed.includes(filmValue(film, column));
        });
      });

      if (customSort) {
        switch(customSort){
          case "ratingDesc": result.sort((a,b)=>(b.rating||0)-(a.rating||0)); break;
          case "ratingAsc": result.sort((a,b)=>(a.rating||0)-(b.rating||0)); break;
          case "watchDesc": result.sort((a,b)=>(b.watchDate||"").localeCompare(a.watchDate||"")); break;
          case "watchAsc": result.sort((a,b)=>(a.watchDate||"").localeCompare(b.watchDate||"")); break;
          case "releaseDesc": result.sort((a,b)=>(b.releaseDate||"").localeCompare(a.releaseDate||"")); break;
          case "releaseAsc": result.sort((a,b)=>(a.releaseDate||"").localeCompare(b.releaseDate||"")); break;
          case "titleAsc": result.sort((a,b)=>(a.title||"").localeCompare(b.title||"","fr")); break;
          case "titleDesc": result.sort((a,b)=>(b.title||"").localeCompare(a.title||"","fr")); break;
        }
        return result;
      }
      return result;
    }

    function renderStats() {
      const viewed = films.filter(f => f.category === "Vu");
      const watchlist = films.filter(f => f.category === "A voir");
      const avg = viewed.length ? (viewed.reduce((sum, f) => sum + Number(f.rating || 0), 0) / viewed.length).toFixed(1) : "0.0";
      const genreTop = topCount(viewed.flatMap(f => (f.genre || "").split(",").map(g => g.trim()).filter(Boolean)));
      
      statsBar.innerHTML = `
        <div class="stat"><div class="stat-icon">🔪</div><div><span>Films vus</span><strong>${viewed.length}</strong></div></div>
        <div class="stat"><div class="stat-icon">🩸</div><div><span>À voir</span><strong>${watchlist.length}</strong></div></div>
        <div class="stat"><div class="stat-icon">⭐</div><div><span>Moyenne</span><strong>${avg}/5</strong></div></div>
        <div class="stat"><div class="stat-icon">💀</div><div><span>Genre</span><strong>${escapeHTML(genreTop || "Aucun")}</strong></div></div>
      `;
    }

    function topCount(items) {
      const map = {};
      items.forEach(item => map[item] = (map[item] || 0) + 1);
      const top = Object.entries(map).sort((a,b) => b[1] - a[1])[0];
      return top ? top[0] : "";
    }

    function renderLatest() {
      if (!latestList) return;
      const latest = [...films].sort((a,b)=>{ const at=a.createdAt?.seconds||0; const bt=b.createdAt?.seconds||0; return bt-at; }).slice(0,4);

      if (latest.length === 0) {
        latestList.innerHTML = `<div class="empty" style="padding: 20px;">Le caveau est vide</div>`;
        return;
      }
      latestList.innerHTML = latest.map(film => `
        <div class="latest-item" data-latest-id="${film.id}">
          ${film.cover ? `<img src="${film.cover}" alt="Cover">` : `<div class="latest-no-cover">No cover</div>`}
          <div>
            <strong>${escapeHTML(film.title)}</strong>
            <span>${film.rating ? "★ " + escapeHTML(String(film.rating)) + "/5" : escapeHTML(film.category || "")}</span>
          </div>
        </div>
      `).join("");

      latestList.querySelectorAll("[data-latest-id]").forEach(item => {
        item.addEventListener("click", () => {
          const film = films.find(f => f.id === item.dataset.latestId);
          if (film) openModal(film);
        });
      });
    }

    function isValidStatLabel(value) {
      const key = String(value || "").trim();
      if (!key) return false;
      const lowered = key.toLowerCase();
      return lowered !== "undefined" && lowered !== "null" && lowered !== "-" && lowered !== "nan";
    }

    function countBy(items, getter) {
      const map = {};
      items.forEach(item => {
        const raw = getter(item);
        if (Array.isArray(raw)) {
          raw.forEach(value => {
            const key = String(value || "").trim();
            if (isValidStatLabel(key)) map[key] = (map[key] || 0) + 1;
          });
        } else {
          const key = String(raw || "").trim();
          if (isValidStatLabel(key)) map[key] = (map[key] || 0) + 1;
        }
      });
      return Object.entries(map).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "fr"));
    }

    function renderStatsRows(entries, maxValue, showMedals = false) {
      if (!entries.length) return `<div class="empty" style="padding:15px;">Pas de données.</div>`;
      const medals = ["🥇", "🥈", "🥉"];
      const max = maxValue || entries[0][1] || 1;
      return `<div class="stats-list">${entries.map(([label, value], index) => `
        <div class="stats-row">
          <strong>${showMedals && medals[index] ? medals[index] + " " : ""}${escapeHTML(label)}</strong>
          <span>${value}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, Math.round((value / max) * 100))}%"></div></div>
        </div>
      `).join("")}</div>`;
    }

    function renderAdvancedStats() {
      const viewed = films.filter(f => f.category === "Vu");
      const rated = viewed.filter(f => Number(f.rating || 0) > 0);
      const avg = rated.length ? (rated.reduce((sum, f) => sum + Number(f.rating || 0), 0) / rated.length).toFixed(1) : "0.0";
      const years = countBy(viewed.filter(f => f.watchDate), f => yearFromWatchDate(f)).sort((a, b) => Number(b[0]) - Number(a[0]));
      const genres = countBy(viewed, f => (f.genre || "").split(",").map(g => g.trim())).slice(0, 5);
      const directors = countBy(viewed, f => f.director || "").slice(0, 5);
      const best = [...rated].filter(f => Number(f.rating || 0) >= 4).sort((a, b) => Number(b.rating || 0) - Number(a.rating || 0)).slice(0, 8);

      return `
        <section class="advanced-stats">
          <div class="stats-grid">
            <div class="stats-card"><h3>Total Films Vus</h3><div class="stats-big">${viewed.length}</div></div>
            <div class="stats-card"><h3>Note Globale</h3><div class="stats-big">${avg}</div></div>
            <div class="stats-card"><h3>Top Genres</h3>${renderStatsRows(genres, null, true)}</div>
            <div class="stats-card"><h3>Top Réalisateurs</h3>${renderStatsRows(directors, null, true)}</div>
          </div>
          <div class="stats-card">
            <h3>Les Meilleurs Films (4+ ⭐)</h3>
            ${best.length ? `<div class="best-movies">${best.map(film => `
              <article class="best-movie" data-id="${film.id}">
                ${film.cover ? `<img src="${film.cover}" alt="Cover">` : `<div style="padding:30px; text-align:center;">No cover</div>`}
                <div><strong>${escapeHTML(film.title)}</strong><span style="color:var(--gold2);">★ ${escapeHTML(String(film.rating))}</span></div>
              </article>
            `).join("")}</div>` : `<div class="empty">Aucun chef-d'œuvre noté pour l'instant.</div>`}
          </div>
        </section>
      `;
    }

    function renderTable() {
      if (activeTab === "Stats") {
        tableContainer.innerHTML = renderAdvancedStats();
        tableContainer.querySelectorAll(".best-movie[data-id]").forEach(item => {
          item.addEventListener("click", () => {
            const film = films.find(f => f.id === item.dataset.id);
            if (film) openModal(film);
          });
        });
        return;
      }

      const columns = columnsByTab[activeTab];
      const visibleFilms = getVisibleFilms();

      let html = `<table><thead><tr></tr></thead><tbody>`;

      if (visibleFilms.length === 0) {
        html += `<tr><td colspan="${columns.length}" class="empty">Aucun film trouvé. La nuit est calme...</td></tr>`;
      } else {
        visibleFilms.forEach(film => {
          html += `<tr data-id="${film.id}">`;
          columns.forEach(column => {
            if (column === "Cover") {
              html += `<td data-label="${column}">${film.cover ? `<img class="cover-thumb" src="${film.cover}" alt="${escapeHTML(film.title)}">` : `<div class="no-cover">Pas d'image</div>`}</td>`;
            } else {
              html += `<td data-label="${column}">${escapeHTML(filmValue(film, column))}</td>`;
            }
          });
          html += `</tr>`;
        });
      }

      html += `</tbody></table>`;
      tableContainer.innerHTML = html;
    }

    function renderStars() {
      const stars = document.getElementById("stars");
      stars.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const wrap = document.createElement("div");
        wrap.className = "star-wrap";
        const fillPercent = Math.max(0, Math.min(1, currentRating - (i - 1))) * 100;
        wrap.innerHTML = `<span class="star-empty">★</span><span class="star-fill" style="width:${fillPercent}%">★</span>`;
        wrap.addEventListener("mousemove", e => {
          const rect = wrap.getBoundingClientRect();
          currentRating = i - 1 + (e.clientX - rect.left < rect.width / 2 ? 0.5 : 1);
          renderStars();
        });
        wrap.addEventListener("click", e => {
          const rect = wrap.getBoundingClientRect();
          currentRating = i - 1 + (e.clientX - rect.left < rect.width / 2 ? 0.5 : 1);
          renderStars();
        });
        stars.appendChild(wrap);
      }
      const txt = document.createElement("span");
      txt.className = "rating-text";
      txt.textContent = currentRating ? `${currentRating}/5` : "Non noté";
      stars.appendChild(txt);
    }

    function openModal(film = null) {
      editingId = film?.id || null;
      modalTitle.textContent = film ? "Modifier le film" : "Nouvelle victime";
      deleteBtn.style.display = film ? "inline-block" : "none";

      titleInput.value = film?.title || "";
      directorInput.value = film?.director || "";
      genreInput.value = film?.genre || "";
      releaseDateInput.value = film?.releaseDate || "";
      watchDateInput.value = film?.watchDate || "";
      categoryInput.value = film?.category || (activeTab === "A voir" ? "A voir" : "Vu");
      actorsInput.value = film?.actors || "";
      overviewInput.value = film?.overview || "";
      currentRating = film?.rating || 0;
      coverInput.dataset.tmdbCover = film?.cover || "";
      tmdbStatus.textContent = "";
      tmdbResults.style.display = "none";
      updateCategoryFields();
      renderStars();
      dialog.showModal();
    }

    function updateCategoryFields() {
      const isViewed = categoryInput.value === "Vu";
      ratingField.style.display = isViewed ? "block" : "none";
      watchDateField.style.display = isViewed ? "block" : "none";
    }

    async function fetchJSON(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error("Erreur réseau");
      return response.json();
    }

    async function applyTMDBMovie(movie) {
      tmdbStatus.textContent = "Extraction de l'âme du film...";
      const details = await fetchJSON(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&language=fr-FR&append_to_response=credits`);

      titleInput.value = details.title || movie.title || titleInput.value;
      releaseDateInput.value = details.release_date || movie.release_date || "";
      overviewInput.value = details.overview || "";
      genreInput.value = (details.genres || []).map(g => g.name).join(", ");
      directorInput.value = details.credits?.crew?.find(p => p.job === "Director")?.name || "";
      actorsInput.value = (details.credits?.cast || []).slice(0, 5).map(p => p.name).join(", ");

      if (details.poster_path || movie.poster_path) {
        coverInput.dataset.tmdbCover = `${TMDB_IMAGE_BASE}${details.poster_path || movie.poster_path}`;
        tmdbStatus.textContent = `Affiche récupérée.`;
      } else {
        coverInput.dataset.tmdbCover = "";
        tmdbStatus.textContent = "Pas d'affiche disponible.";
      }
    }

    async function fetchTMDBCover() {
      const title = titleInput.value.trim();
      if (!title) return tmdbStatus.textContent = "Veuillez taper un titre d'abord.";
      
      tmdbStatus.textContent = "Recherche dans les ténèbres...";
      try {
        const data = await fetchJSON(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}&language=fr-FR`);
        const results = (data.results || []).slice(0, 6);
        
        if (!results.length) return tmdbStatus.textContent = "Rien trouvé.";
        
        tmdbStatus.textContent = "Sélectionnez l'affiche correspondante :";
        tmdbResults.style.display = "grid";
        tmdbResults.innerHTML = results.map((movie, idx) => `
          <div class="tmdb-choice" data-index="${idx}" style="cursor:pointer;">
            ${movie.poster_path ? `<img src="${TMDB_IMAGE_BASE}${movie.poster_path}">` : `<div style="height:150px;">No Cover</div>`}
            <strong style="font-size:0.8rem">${escapeHTML(movie.title)}</strong><br>
            <span style="font-size:0.7rem; color:#aaa;">${movie.release_date?.slice(0,4) || ""}</span>
          </div>
        `).join("");
        
        tmdbResults.querySelectorAll(".tmdb-choice").forEach(btn => {
          btn.addEventListener("click", async () => {
            tmdbResults.style.display = "none";
            await applyTMDBMovie(results[btn.dataset.index]);
          });
        });
      } catch (err) {
        tmdbStatus.textContent = "Erreur lors de la recherche.";
      }
    }

    function closeModal() {
      dialog.close(); form.reset(); editingId = null; currentRating = 0;
    }

    async function submitFilm(e) {
      e.preventDefault();
      syncStatus.textContent = "Sauvegarde dans le grimoire...";
      const existing = films.find(f => f.id === editingId);
      const cat = categoryInput.value;
      const data = {
        title: titleInput.value.trim(), director: directorInput.value.trim(),
        genre: genreInput.value.trim(), releaseDate: releaseDateInput.value,
        watchDate: cat === "Vu" ? watchDateInput.value : "", rating: cat === "Vu" ? currentRating : 0,
        category: cat, cover: coverInput.dataset.tmdbCover || existing?.cover || "",
        actors: actorsInput.value.trim(), overview: overviewInput.value.trim(),
        updatedAt: serverTimestamp()
      };
      
      if (editingId) await setDoc(doc(db, "films", editingId), data, { merge: true });
      else await addDoc(filmsCollection, { ...data, createdAt: serverTimestamp() });
      
      setActiveTab(cat); closeModal();
    }

    async function deleteCurrentFilm() {
      if (!editingId || !confirm("Envoyer ce film aux oubliettes ?")) return;
      await deleteDoc(doc(db, "films", editingId)); closeModal();
    }

    function setActiveTab(tab) {
      activeTab = tab; resetFilters();
      ["Tous", "Vu", "AVoir", "Stats"].forEach(t => {
        const btn = document.getElementById(`tab${t}`);
        if(btn) btn.classList.toggle("active", (t==="AVoir"?"A voir":t) === activeTab);
      });
      renderTable();
    }

    function resetFilters() {
      filters = {}; sortState = { column: null, direction: null }; customSort="";
      document.getElementById("searchInput").value = "";
      if(yearFilter) { selectedYear = "Toutes"; yearFilter.value = "Toutes"; }
      if(sortSelect) sortSelect.value = "";
    }

    function escapeHTML(str) {
      return String(str||"").replace(/[&<>'"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[c]));
    }

    document.getElementById("tabTous").addEventListener("click", () => setActiveTab("Tous"));
    document.getElementById("tabVu").addEventListener("click", () => setActiveTab("Vu"));
    document.getElementById("tabAVoir").addEventListener("click", () => setActiveTab("A voir"));
    document.getElementById("tabStats").addEventListener("click", () => setActiveTab("Stats"));
    document.getElementById("addBtn").addEventListener("click", () => openModal());
    document.getElementById("fetchCoverBtn").addEventListener("click", fetchTMDBCover);
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("deleteBtn").addEventListener("click", deleteCurrentFilm);
    document.getElementById("searchInput").addEventListener("input", renderTable);
    if(yearFilter) yearFilter.addEventListener("change", () => { selectedYear = yearFilter.value; renderTable(); });
    if(sortSelect) sortSelect.addEventListener("change", () => { customSort = sortSelect.value; renderTable(); });
    document.getElementById("resetFiltersBtn").addEventListener("click", () => { resetFilters(); renderTable(); });
    categoryInput.addEventListener("change", updateCategoryFields);
    form.addEventListener("submit", submitFilm);
    
    tableContainer.addEventListener("click", e => {
      const row = e.target.closest("tr[data-id]");
      if (row) {
        const film = films.find(f => f.id === row.dataset.id);
        if (film) openModal(film);
      }
    });

    renderTable(); renderStats(); renderLatest();
  </script>
</body>
</html>
