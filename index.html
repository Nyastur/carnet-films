<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carnet de films</title>

  <style>
    :root {
      --bg: #020102;
      --black: #060203;
      --panel: rgba(9, 4, 4, 0.96);
      --panel2: rgba(18, 7, 8, 0.96);
      --card: rgba(12, 5, 5, 0.98);
      --red: #8b0017;
      --red2: #d9092d;
      --red3: #ff173f;
      --gold: #9e7338;
      --gold2: #d9a75d;
      --text: #fff1e5;
      --muted: #bda08f;
      --line: rgba(158, 115, 56, 0.38);
      --line2: rgba(217, 9, 45, 0.34);
      --glow: 0 0 34px rgba(217, 9, 45, .35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 18% 6%, rgba(180,0,35,.28), transparent 25%),
        radial-gradient(circle at 80% 8%, rgba(130,0,28,.24), transparent 28%),
        linear-gradient(135deg, #020102 0%, #130508 48%, #030102 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.88), transparent 14%, transparent 86%, rgba(0,0,0,.88)),
        radial-gradient(circle at 50% 45%, transparent 35%, rgba(0,0,0,.72) 100%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 1px, transparent 1px 5px);
      opacity: .9;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1380px, calc(100% - 30px));
      margin: 24px auto;
      display: block;
    }

    .sidebar { display: none !important; }

    .side-emblem { display: none !important; }

    .side-btn { display: none !important; }

    .side-btn.active { display: none !important; }

    .side-btn span { display: none !important; }

    .quote { display: none !important; }

    .main {
      width: 100%;
      display: grid;
      gap: 18px;
    }

    .hero {
      width: 100%;
      position: relative;
      min-height: 250px;
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(18,6,7,.92), rgba(5,2,2,.96)),
        radial-gradient(circle at 50% 0%, rgba(217,9,45,.22), transparent 45%);
      box-shadow: var(--glow), inset 0 0 70px rgba(158,115,56,.05);
      padding: 38px 34px 26px;
      text-align: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(158,115,56,.26);
      border-radius: 16px;
      pointer-events: none;
    }

    .hero::after {
      content: "☠";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--gold2);
      font-size: 1.5rem;
      text-shadow: 0 0 16px rgba(217,9,45,.35);
    }

    h1 {
      margin: 10px 0 0;
      color: #fff2e6;
      font-size: clamp(2.6rem, 6vw, 5.8rem);
      letter-spacing: 8px;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255,210,130,.35),
        0 0 38px rgba(255,23,63,.58),
        5px 5px 0 #260006;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--gold2);
      letter-spacing: 9px;
      text-transform: uppercase;
      font-size: clamp(.7rem, 1.3vw, 1rem);
    }

    #syncStatus {
      margin-top: 12px;
      color: var(--muted);
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: .82rem;
    }

    .stats {
      margin-top: 26px;
      display: flex !important;
      flex-wrap: nowrap !important;
      gap: 12px;
      width: 100%;
      overflow-x: auto;
      align-items: stretch;
    }

    .stat {
      flex: 1 1 0;
      min-width: 0;
      min-height: 82px;
      border: 1px solid rgba(158,115,56,.3);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(8,3,3,.88), rgba(0,0,0,.55));
      display: grid;
      grid-template-columns: 44px 1fr;
      align-items: center;
      gap: 10px;
      padding: 12px;
      text-align: left;
      box-shadow: inset 0 0 18px rgba(217,9,45,.04);
    }

    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--gold2);
      border: 1px solid rgba(158,115,56,.28);
      background: rgba(0,0,0,.26);
      font-size: 1.3rem;
    }

    .stat span {
      display: block;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .8px;
      font-size: .66rem;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    .stat strong {
      display: block;
      color: var(--red3);
      font-size: 1.55rem;
      margin-top: 2px;
      text-shadow: 0 0 12px rgba(255,23,63,.35);
    }

    .toolbar {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(12,5,5,.95), rgba(4,1,2,.95));
      box-shadow: 0 0 26px rgba(139,0,23,.2);
      padding: 14px;
      display: flex;
      flex-wrap: nowrap;
      gap: 14px;
      align-items: center;
    }

    .tabs {
      display: flex;
      flex-wrap: nowrap;
      border: 1px solid rgba(158,115,56,.30);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: rgba(0,0,0,.24);
    }

    button {
      font-family: Georgia, "Times New Roman", serif;
      border: 1px solid rgba(158,115,56,.35);
      background: linear-gradient(180deg, rgba(55,7,11,.95), rgba(12,3,4,.95));
      color: var(--text);
      padding: 11px 15px;
      border-radius: 12px;
      cursor: pointer;
      transition: .16s ease;
    }

    button:hover,
    button.active {
      color: #fff;
      border-color: var(--red3);
      background: linear-gradient(180deg, rgba(139,0,23,.95), rgba(42,5,9,.95));
      box-shadow: 0 0 16px rgba(217,9,45,.32);
    }

    .tabs button {
      border: 0;
      border-radius: 0;
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .search {
      width: 100%;
      border: 1px solid rgba(158,115,56,.35);
      border-radius: 12px;
      background: rgba(0,0,0,.38);
      color: var(--text);
      padding: 13px 16px;
      outline: none;
      font-family: Georgia, "Times New Roman", serif;
    }

    #addBtn {
      min-width: 180px;
      border-color: rgba(255,208,122,.55);
      background: linear-gradient(180deg, rgba(139,0,23,.95), rgba(44,5,9,.95));
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    #resetFiltersBtn {
      display: none;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
      align-items: start;
    }

    .movie-area,
    .latest-panel {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(12,5,5,.86), rgba(3,1,2,.88));
      box-shadow: var(--glow), inset 0 0 26px rgba(158,115,56,.04);
      padding: 16px;
    }

    .section-title,
    .latest-panel h2 {
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff1e5;
      font-size: 1.3rem;
      font-weight: normal;
    }

    .section-title::before {
      content: "▦";
      color: var(--gold2);
    }

    .section-title::after,
    .latest-panel h2::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--red2), transparent);
    }

    .latest-panel h2 {
      justify-content: center;
      color: var(--gold2);
      font-size: .95rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .latest-panel h2::before {
      content: "✦";
      color: var(--gold);
    }

    .table-wrap {
      overflow: visible;
    }

    table,
    thead,
    tbody,
    tr,
    th,
    td {
      display: block;
    }

    table {
      width: 100%;
    }

    thead {
      display: none;
    }

    tbody {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(205px, 1fr));
      gap: 18px;
    }

    tbody tr {
      min-height: 100%;
      border: 1px solid rgba(158,115,56,.42);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17,7,7,.98), rgba(3,1,2,.98));
      box-shadow: 0 0 18px rgba(217,9,45,.13), inset 0 0 16px rgba(158,115,56,.04);
      overflow: hidden;
      cursor: pointer;
      transition: .18s ease;
    }

    tbody tr:hover {
      transform: translateY(-4px);
      border-color: var(--gold2);
      box-shadow: 0 0 28px rgba(217,9,45,.30);
    }

    tbody td {
      border: 0;
      padding: 0 14px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.42;
    }

    tbody td[data-label="Cover"] {
      padding: 0;
      background: #000;
    }

    .cover-thumb,
    tbody td[data-label="Cover"] .no-cover {
      width: 100%;
      height: 310px;
      object-fit: cover;
      border-radius: 0;
      border: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.45);
      color: var(--muted);
    }

    tbody td[data-label="Titre"] {
      padding-top: 14px;
      color: var(--red3);
      font-family: Georgia, "Times New Roman", serif;
      font-weight: bold;
      font-size: 1.1rem;
      letter-spacing: .6px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(217,9,45,.25);
    }

    tbody td[data-label="Réalisateur"] {
      padding-top: 5px;
      color: #e8c0ab;
    }

    tbody td[data-label="Genre"],
    tbody td[data-label="Date de sortie"],
    tbody td[data-label="Date de visionnage"] {
      padding-top: 4px;
    }

    tbody td[data-label="Date de visionnage"]::before {
      content: "Vu le ";
      color: var(--gold);
    }

    tbody td[data-label="Note"] {
      padding-top: 10px;
      padding-bottom: 15px;
      color: var(--gold2);
      font-weight: bold;
    }

    tbody td[data-label="Note"]::before {
      content: "★ ★ ★ ★ ★  ";
      color: var(--red3);
      letter-spacing: 1px;
      font-weight: normal;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 36px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(0,0,0,.24);
    }

    .filter-btn,
    .sort-label,
    .sort-arrow {
      display: none;
    }

    #latestList {
      display: grid;
      gap: 12px;
    }

    .latest-item {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 12px;
      border: 1px solid rgba(158,115,56,.24);
      border-radius: 13px;
      padding: 9px;
      background: rgba(0,0,0,.25);
      cursor: pointer;
    }

    .latest-item:hover {
      border-color: var(--red3);
      box-shadow: 0 0 15px rgba(217,9,45,.20);
    }

    .latest-item img,
    .latest-no-cover {
      width: 62px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(158,115,56,.25);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: .65rem;
    }

    .latest-item strong {
      display: block;
      color: var(--red3);
      font-size: .98rem;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .latest-item span {
      display: block;
      color: var(--muted);
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: .78rem;
      line-height: 1.35;
    }

    .filter-menu,
    .preview {
      display: none !important;
    }

    dialog {
      width: min(860px, calc(100% - 28px));
      border: 1px solid var(--line);
      border-radius: 20px;
      color: var(--text);
      background: linear-gradient(180deg, #160608, #050202);
      box-shadow: 0 0 45px rgba(217,9,45,.35);
    }

    dialog::backdrop {
      background: rgba(0,0,0,.84);
      backdrop-filter: blur(4px);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal-head h2 {
      margin: 0;
      color: #fff1e5;
      text-shadow: 0 0 12px rgba(217,9,45,.45);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label span,
    .field-title {
      display: block;
      margin-bottom: 6px;
      color: var(--gold2);
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      text-transform: uppercase;
      letter-spacing: .6px;
      font-size: .78rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(158,115,56,.34);
      border-radius: 12px;
      background: rgba(0,0,0,.36);
      color: var(--text);
      padding: 12px;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .stars {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
      padding: 8px 0;
    }

    .star-wrap {
      position: relative;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 28px;
      line-height: 28px;
      color: #3a2528;
    }

    .star-fill {
      position: absolute;
      inset: 0;
      overflow: hidden;
      color: var(--gold2);
      width: 0%;
      pointer-events: none;
    }

    .star-empty {
      position: absolute;
      inset: 0;
    }

    .rating-text {
      color: var(--muted);
      margin-left: 8px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: .9rem;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .tmdb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
    }

    .tmdb-choice {
      border-radius: 14px;
      padding: 8px;
      text-align: left;
      white-space: normal;
    }

    .tmdb-choice img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .details-line {
      color: var(--muted);
      font-size: .82rem;
      max-width: 260px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .latest-panel {
        display: none;
      }

      
    }

      .sidebar {
        display: none;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .latest-panel {
        display: none;
      }

      
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 18px, 1380px);
        margin: 12px auto 28px;
        display: block;
      }

      .hero {
        padding: 30px 14px 20px;
        min-height: auto;
      }

      h1 {
        font-size: clamp(1.75rem, 10vw, 3rem);
        letter-spacing: 2px;
      }

      .subtitle {
        letter-spacing: 3px;
        font-size: .58rem;
      }

      .stats {
        display:flex;
        gap: 8px;
      }

      .stat {
        grid-template-columns: 34px 1fr;
        min-height: 66px;
        padding: 10px;
      }

      .stat-icon {
        width: 32px;
        height: 32px;
        font-size: 1rem;
      }

      .stat strong {
        font-size: 1.05rem;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .tabs {
        display:flex;
      }

      .search,
      #addBtn {
        width: 100%;
        min-width: 0;
      }

      .movie-area {
        padding: 0;
        background: transparent;
        border: 0;
        box-shadow: none;
      }

      .section-title {
        display: none;
      }

      tbody {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      tbody tr {
        display: grid;
        grid-template-columns: 86px 1fr;
        gap: 8px 14px;
        padding: 14px;
        border-radius: 18px;
      }

      tbody td {
        padding: 0;
      }

      tbody td[data-label="Cover"] {
        grid-row: 1 / span 6;
      }

      .cover-thumb,
      tbody td[data-label="Cover"] .no-cover {
        width: 86px;
        height: 128px;
        border-radius: 12px;
      }

      tbody td[data-label="Titre"] {
        padding: 0;
        font-size: 1.05rem;
      }

      tbody td[data-label="Note"]::before {
        content: "★ ";
      }

      dialog {
        max-height: 92vh;
        overflow: auto;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .modal-actions > div {
        display: flex;
        gap: 10px;
        width: 100%;
      }

      .modal-actions button {
        flex: 1;
      }
    }

    @media (max-width: 420px) {
      

      tbody tr {
        grid-template-columns: 78px 1fr;
      }

      .cover-thumb,
      tbody td[data-label="Cover"] .no-cover {
        width: 78px;
        height: 116px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    

    <main class="main">
      <header class="hero">
        <h1>Carnet de films</h1>
        <div class="subtitle">Collection personnelle</div>
        <div id="syncStatus">Connexion à Firebase...</div>

        <section class="stats" id="statsBar"></section>
      </header>

      <nav class="toolbar">
        <div class="tabs">
          <button id="tabTous" class="active" type="button">Tous</button>
          <button id="tabVu" type="button">Vus</button>
          <button id="tabAVoir" type="button">A voir</button>
        </div>

        <input id="searchInput" class="search" type="search" placeholder="Rechercher un film..." />

        <button id="addBtn" type="button">+ Ajouter un film</button>
        <button id="resetFiltersBtn" type="button">Réinitialiser tous les filtres</button>
      </nav>

      <section class="layout">
        <section class="movie-area">
          <h2 class="section-title">Mes films</h2>
          <main class="table-wrap" id="tableContainer"></main>
        </section>

        <aside class="latest-panel">
          <h2>Derniers ajoutés</h2>
          <div id="latestList"></div>
        </aside>
      </section>
    </main>
  </div>

  <div id="filterMenu" class="filter-menu"></div>
  <img id="coverPreview" class="preview" alt="Aperçu de la cover" />

  <dialog id="filmDialog">
    <form method="dialog" id="filmForm">
      <div class="modal-head">
        <h2 id="modalTitle">Ajouter un film</h2>
        <button type="button" id="closeModalBtn">Fermer</button>
      </div>

      <div class="form-grid">
        <div class="field full" id="tmdbSearchBox" style="display:grid; gap:10px; margin-bottom:8px;">
          <div style="display:flex; gap:10px; align-items:end; flex-wrap:wrap;">
            <div style="flex:1; min-width:220px;">
              <span class="field-title">Recherche automatique TMDB</span>
              <button type="button" id="fetchCoverBtn" style="width:100%;">Chercher un film automatiquement</button>
            </div>
            <div id="tmdbStatus" class="details-line"></div>
          </div>
          <div id="tmdbResults" class="tmdb-grid" style="display:none;"></div>
        </div>

        <label class="field">
          <span>Titre</span>
          <input id="titleInput" required />
        </label>

        <label class="field">
          <span>Réalisateur</span>
          <input id="directorInput" />
        </label>

        <label class="field">
          <span>Genre</span>
          <input id="genreInput" placeholder="Slasher, found footage, possession..." />
        </label>

        <label class="field">
          <span>Date de sortie</span>
          <input id="releaseDateInput" type="date" />
        </label>

        <label class="field" id="watchDateField">
          <span>Date de visionnage</span>
          <input id="watchDateInput" type="date" />
        </label>

        <label class="field">
          <span>Catégorie</span>
          <select id="categoryInput">
            <option value="Vu">Vu</option>
            <option value="A voir">A voir</option>
          </select>
        </label>

        <label class="field">
          <span>Acteurs principaux</span>
          <input id="actorsInput" placeholder="Acteurs principaux" />
        </label>

        <label class="field full">
          <span>Résumé</span>
          <textarea id="overviewInput" placeholder="Résumé du film"></textarea>
        </label>

        <div class="field full" id="ratingField">
          <span class="field-title">Note</span>
          <div class="stars" id="stars"></div>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" id="deleteBtn" class="danger-btn">Supprimer</button>
        <div>
          <button type="button" id="cancelBtn">Annuler</button>
          <button type="submit">Enregistrer</button>
        </div>
      </div>
    </form>
  </dialog>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      setDoc,
      deleteDoc,
      doc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9FZWQIVnjmIymK-Dc5x0MyPlbNMr0kj0",
      authDomain: "carnet-films.firebaseapp.com",
      projectId: "carnet-films",
      storageBucket: "carnet-films.firebasestorage.app",
      messagingSenderId: "59752649700",
      appId: "1:59752649700:web:1e4c809b4a0fbf4c822df1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const filmsCollection = collection(db, "films");

    const TMDB_API_KEY = "e859b9c9246453cc5aed971926007836";
    const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

    let films = [];
    let activeTab = "Tous";
    let editingId = null;
    let currentRating = 0;
    let filters = {};
    let sortState = { column: null, direction: null };
    let openedFilterColumn = null;

    const columnsByTab = {
      "Tous": ["Cover", "Titre", "Réalisateur", "Genre", "Catégorie", "Date de sortie", "Date de visionnage", "Note"],
      "Vu": ["Cover", "Titre", "Réalisateur", "Genre", "Date de sortie", "Date de visionnage", "Note"],
      "A voir": ["Cover", "Titre", "Réalisateur", "Genre", "Date de sortie"]
    };

    const tableContainer = document.getElementById("tableContainer");
    const filterMenu = document.getElementById("filterMenu");
    const coverPreview = document.getElementById("coverPreview");
    const dialog = document.getElementById("filmDialog");
    const form = document.getElementById("filmForm");
    const statsBar = document.getElementById("statsBar");
    const syncStatus = document.getElementById("syncStatus");
    const latestList = document.getElementById("latestList");

    const titleInput = document.getElementById("titleInput");
    const directorInput = document.getElementById("directorInput");
    const genreInput = document.getElementById("genreInput");
    const releaseDateInput = document.getElementById("releaseDateInput");
    const watchDateInput = document.getElementById("watchDateInput");
    const watchDateField = document.getElementById("watchDateField");
    const categoryInput = document.getElementById("categoryInput");
    const coverInput = { dataset: {} };
    const actorsInput = document.getElementById("actorsInput");
    const overviewInput = document.getElementById("overviewInput");
    const ratingField = document.getElementById("ratingField");
    const deleteBtn = document.getElementById("deleteBtn");
    const modalTitle = document.getElementById("modalTitle");
    const tmdbStatus = document.getElementById("tmdbStatus");
    const tmdbResults = document.getElementById("tmdbResults");

    onSnapshot(filmsCollection, snapshot => {
      films = snapshot.docs.map(document => migrateFilm({ id: document.id, ...document.data() }));
      syncStatus.textContent = "Synchronisé avec Firebase";
      renderTable();
      renderStats();
      renderLatest();
    }, error => {
      console.error(error);
      syncStatus.textContent = "Erreur Firebase : vérifie les règles Firestore";
    });

    function migrateFilm(film) {
      return {
        id: film.id || uid(),
        title: film.title || "",
        director: film.director || "",
        genre: film.genre || "",
        releaseDate: film.releaseDate || film.date || "",
        watchDate: film.watchDate || (film.category === "Vu" ? film.date || "" : ""),
        rating: Number(film.rating || 0),
        category: film.category || "Vu",
        cover: film.cover || "",
        actors: film.actors || "",
        overview: film.overview || "",
        tmdbId: film.tmdbId || null
      };
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function formatDate(value) {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      return year && month && day ? `${day}/${month}/${year}` : value;
    }

    function yearFromDate(value) {
      return value ? Number(value.slice(0, 4)) : 0;
    }

    function normalizeColumn(column) {
      if (column === "Date de sortie") return "releaseDate";
      if (column === "Date de visionnage") return "watchDate";
      return column;
    }

    function filmValue(film, column) {
      const normalized = normalizeColumn(column);
      if (normalized === "Cover") return film.cover ? "Avec cover" : "Sans cover";
      if (normalized === "Titre") return film.title || "";
      if (normalized === "Réalisateur") return film.director || "";
      if (normalized === "Genre") return film.genre || "";
      if (normalized === "Catégorie") return film.category === "Vu" ? "Vu" : "A voir";
      if (normalized === "releaseDate") return formatDate(film.releaseDate) || "";
      if (normalized === "watchDate") return formatDate(film.watchDate) || "";
      if (normalized === "Note") return film.rating ? `${film.rating}/5` : "";
      return "";
    }

    function getVisibleFilms() {
      const search = document.getElementById("searchInput").value.trim().toLowerCase();
      const result = films.filter(film => {
        if (activeTab !== "Tous" && film.category !== activeTab) return false;
        const haystack = `${film.title} ${film.director} ${film.genre} ${film.actors}`.toLowerCase();
        if (search && !haystack.includes(search)) return false;
        return Object.entries(filters).every(([column, allowed]) => {
          if (!allowed || allowed.length === 0) return true;
          return allowed.includes(filmValue(film, column));
        });
      });

      if (sortState.column && sortState.direction) {
        result.sort((a, b) => {
          let av = filmValue(a, sortState.column);
          let bv = filmValue(b, sortState.column);

          if (normalizeColumn(sortState.column) === "releaseDate") {
            av = a.releaseDate || "";
            bv = b.releaseDate || "";
          }

          if (normalizeColumn(sortState.column) === "watchDate") {
            av = a.watchDate || "";
            bv = b.watchDate || "";
          }

          if (normalizeColumn(sortState.column) === "Note") {
            av = Number(a.rating || 0);
            bv = Number(b.rating || 0);
            return sortState.direction === "asc" ? av - bv : bv - av;
          }

          const comparison = String(av).localeCompare(String(bv), "fr", { numeric: true, sensitivity: "base" });
          return sortState.direction === "asc" ? comparison : -comparison;
        });
      }

      return result;
    }

    function renderStats() {
      const viewed = films.filter(f => f.category === "Vu");
      const watchlist = films.filter(f => f.category === "A voir");
      const avg = viewed.length ? (viewed.reduce((sum, f) => sum + Number(f.rating || 0), 0) / viewed.length).toFixed(1) : "0.0";
      const genreTop = topCount(viewed.flatMap(f => (f.genre || "").split(",").map(g => g.trim()).filter(Boolean)));
      const hours = viewed.length ? viewed.length * 2 : 0;

      statsBar.innerHTML = `
        <div class="stat"><div class="stat-icon">◉</div><div><span>Films vus</span><strong>${viewed.length}</strong></div></div>
        <div class="stat"><div class="stat-icon">👁</div><div><span>À voir</span><strong>${watchlist.length}</strong></div></div>
        <div class="stat"><div class="stat-icon">★</div><div><span>Note moyenne</span><strong>${avg}/5</strong></div></div>
        <div class="stat"><div class="stat-icon">◷</div><div><span>Heures vues</span><strong>${hours}h</strong></div></div>
        <div class="stat"><div class="stat-icon">🎭</div><div><span>Genre préféré</span><strong>${escapeHTML(genreTop || "Aucun")}</strong></div></div>
        <div class="stat"><div class="stat-icon">✦</div><div><span>Total</span><strong>${films.length}</strong></div></div>
      `;
    }

    function topCount(items) {
      const map = {};
      items.forEach(item => map[item] = (map[item] || 0) + 1);
      const top = Object.entries(map).sort((a,b) => b[1] - a[1])[0];
      return top ? top[0] : "";
    }

    function renderLatest() {
      if (!latestList) return;
      const latest = [...films].slice(-5).reverse();

      if (latest.length === 0) {
        latestList.innerHTML = `<div class="empty">Aucun film</div>`;
        return;
      }

      latestList.innerHTML = latest.map(film => `
        <div class="latest-item" data-latest-id="${film.id}">
          ${film.cover ? `<img src="${film.cover}" alt="Cover de ${escapeHTML(film.title)}">` : `<div class="latest-no-cover">No cover</div>`}
          <div>
            <strong>${escapeHTML(film.title)}</strong>
            <span>${escapeHTML(film.director || "")}${film.releaseDate ? " • " + escapeHTML((film.releaseDate || "").slice(0,4)) : ""}</span>
            <span>${film.rating ? "★ " + escapeHTML(String(film.rating)) + "/5" : escapeHTML(film.category || "")}</span>
          </div>
        </div>
      `).join("");

      latestList.querySelectorAll("[data-latest-id]").forEach(item => {
        item.addEventListener("click", () => {
          const film = films.find(f => f.id === item.dataset.latestId);
          if (film) openModal(film);
        });
      });
    }

    function renderTable() {
      const columns = columnsByTab[activeTab];
      const visibleFilms = getVisibleFilms();

      let html = `<table><thead><tr>`;
      columns.forEach(column => {
        const arrow = sortState.column === column && sortState.direction ? (sortState.direction === "asc" ? "▲" : "▼") : "";
        html += `<th><span class="sort-label" data-sort="${column}">${column}<span class="sort-arrow">${arrow}</span></span><button class="filter-btn" type="button" data-filter="${column}">▾</button></th>`;
      });
      html += `</tr></thead><tbody>`;

      if (visibleFilms.length === 0) {
        html += `<tr><td colspan="${columns.length}" class="empty">Aucun film dans cet onglet.</td></tr>`;
      } else {
        visibleFilms.forEach(film => {
          html += `<tr data-id="${film.id}">`;
          columns.forEach(column => {
            if (column === "Cover") {
              html += `<td data-label="${column}">${film.cover ? `<img class="cover-thumb" src="${film.cover}" alt="Cover de ${escapeHTML(film.title)}">` : `<div class="no-cover">No cover</div>`}</td>`;
            } else {
              html += `<td data-label="${column}">${escapeHTML(filmValue(film, column))}</td>`;
            }
          });
          html += `</tr>`;
        });
      }

      html += `</tbody></table>`;
      tableContainer.innerHTML = html;
    }

    function renderStars() {
      const stars = document.getElementById("stars");
      stars.innerHTML = "";

      for (let i = 1; i <= 5; i++) {
        const wrap = document.createElement("div");
        wrap.className = "star-wrap";
        const fillPercent = Math.max(0, Math.min(1, currentRating - (i - 1))) * 100;
        wrap.innerHTML = `<span class="star-empty">★</span><span class="star-fill" style="width:${fillPercent}%">★</span>`;

        wrap.addEventListener("mousemove", e => {
          const rect = wrap.getBoundingClientRect();
          currentRating = i - 1 + (e.clientX - rect.left < rect.width / 2 ? 0.5 : 1);
          renderStars();
        });

        wrap.addEventListener("click", e => {
          const rect = wrap.getBoundingClientRect();
          currentRating = i - 1 + (e.clientX - rect.left < rect.width / 2 ? 0.5 : 1);
          renderStars();
        });

        stars.appendChild(wrap);
      }

      const txt = document.createElement("span");
      txt.className = "rating-text";
      txt.textContent = currentRating ? `${currentRating}/5` : "Aucune note";
      stars.appendChild(txt);
    }

    function openModal(film = null) {
      editingId = film?.id || null;
      modalTitle.textContent = film ? "Modifier le film" : "Ajouter un film";
      deleteBtn.style.display = film ? "inline-block" : "none";

      titleInput.value = film?.title || "";
      directorInput.value = film?.director || "";
      genreInput.value = film?.genre || "";
      releaseDateInput.value = film?.releaseDate || "";
      watchDateInput.value = film?.watchDate || "";
      categoryInput.value = film?.category || activeTab;
      actorsInput.value = film?.actors || "";
      overviewInput.value = film?.overview || "";
      currentRating = film?.rating || 0;
      coverInput.value = "";
      coverInput.dataset.tmdbCover = film?.cover || "";
      tmdbStatus.textContent = "";
      tmdbResults.style.display = "none";
      tmdbResults.innerHTML = "";
      updateCategoryFields();
      renderStars();
      dialog.showModal();
    }

    function updateCategoryFields() {
      const isViewed = categoryInput.value === "Vu";
      ratingField.style.display = isViewed ? "block" : "none";
      watchDateField.style.display = isViewed ? "block" : "none";
    }

    async function fetchJSON(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error("Erreur réseau TMDB");
      return response.json();
    }

    async function applyTMDBMovie(movie) {
      tmdbStatus.textContent = "Récupération des infos...";
      const details = await fetchJSON(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&language=fr-FR&append_to_response=credits`);

      titleInput.value = details.title || movie.title || titleInput.value;
      releaseDateInput.value = details.release_date || movie.release_date || "";
      overviewInput.value = details.overview || "";
      genreInput.value = (details.genres || []).map(g => g.name).join(", ");
      directorInput.value = details.credits?.crew?.find(p => p.job === "Director")?.name || "";
      actorsInput.value = (details.credits?.cast || []).slice(0, 5).map(p => p.name).join(", ");

      if (details.poster_path || movie.poster_path) {
        coverInput.dataset.tmdbCover = `${TMDB_IMAGE_BASE}${details.poster_path || movie.poster_path}`;
        tmdbStatus.textContent = `Film sélectionné : ${details.title || movie.title}`;
      } else {
        coverInput.dataset.tmdbCover = "";
        tmdbStatus.textContent = "Infos trouvées, mais aucune cover disponible.";
      }
    }

    async function fetchTMDBCover() {
      const title = titleInput.value.trim();

      if (!title) {
        tmdbStatus.textContent = "Entre un titre avant la recherche.";
        return;
      }

      tmdbStatus.textContent = "Recherche en cours...";
      tmdbResults.style.display = "none";
      tmdbResults.innerHTML = "";

      try {
        const data = await fetchJSON(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}&language=fr-FR`);
        const results = (data.results || []).filter(movie => movie.poster_path || movie.release_date).slice(0, 10);

        if (results.length === 0) {
          tmdbStatus.textContent = "Aucun résultat trouvé.";
          return;
        }

        tmdbStatus.textContent = "Choisis le bon film :";
        tmdbResults.style.display = "grid";
        tmdbResults.innerHTML = results.map((movie, index) => `
          <button type="button" class="tmdb-choice" data-index="${index}">
            ${movie.poster_path ? `<img src="${TMDB_IMAGE_BASE}${movie.poster_path}" alt="${escapeHTML(movie.title)}">` : `<div class="no-cover" style="width:100%; height:150px; margin-bottom:8px;">No cover</div>`}
            <strong>${escapeHTML(movie.title)}</strong><br>
            <span class="details-line">${movie.release_date ? movie.release_date.slice(0, 4) : "Date inconnue"}</span>
          </button>
        `).join("");

        tmdbResults.querySelectorAll(".tmdb-choice").forEach(button => {
          button.addEventListener("click", async () => {
            const movie = results[Number(button.dataset.index)];
            tmdbResults.style.display = "none";
            tmdbResults.innerHTML = "";
            await applyTMDBMovie(movie);
          });
        });
      } catch (error) {
        console.error(error);
        tmdbStatus.textContent = "Erreur TMDB.";
      }
    }

    function closeModal() {
      dialog.close();
      form.reset();
      editingId = null;
      currentRating = 0;
    }

    function getCoverData(existingCover) {
      return Promise.resolve(
        (typeof coverInput !== "undefined" && coverInput?.dataset?.tmdbCover)
          ? coverInput.dataset.tmdbCover
          : (existingCover || "")
      );
    }

    async function submitFilm(event) {
      event.preventDefault();
      syncStatus.textContent = "Sauvegarde en cours...";

      const existing = films.find(f => f.id === editingId);
      const category = categoryInput.value;
      const cover = await getCoverData(existing?.cover);

      const data = {
        title: titleInput.value.trim(),
        director: directorInput.value.trim(),
        genre: genreInput.value.trim(),
        releaseDate: releaseDateInput.value,
        watchDate: category === "Vu" ? watchDateInput.value : "",
        rating: category === "Vu" ? currentRating : 0,
        category,
        cover,
        actors: actorsInput.value.trim(),
        overview: overviewInput.value.trim(),
        tmdbId: existing?.tmdbId || null,
        updatedAt: serverTimestamp()
      };

      if (editingId) {
        await setDoc(doc(db, "films", editingId), data, { merge: true });
      } else {
        await addDoc(filmsCollection, { ...data, createdAt: serverTimestamp() });
      }

      activeTab = category;
      document.getElementById("tabTous").classList.toggle("active", activeTab === "Tous");
      document.getElementById("tabVu").classList.toggle("active", activeTab === "Vu");
      document.getElementById("tabAVoir").classList.toggle("active", activeTab === "A voir");
      closeModal();
    }

    async function deleteCurrentFilm() {
      if (!editingId) return;
      if (!confirm("Supprimer ce film ?")) return;
      await deleteDoc(doc(db, "films", editingId));
      closeModal();
    }

    function resetFilters() {
      filters = {};
      sortState = { column: null, direction: null };
      openedFilterColumn = null;
      document.getElementById("searchInput").value = "";
    }

    function escapeHTML(value) {
      return String(value || "").replace(/[&<>'"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));
    }

    function setActiveTab(tab) {
      activeTab = tab;
      resetFilters();

      document.getElementById("tabTous").classList.toggle("active", activeTab === "Tous");
      document.getElementById("tabVu").classList.toggle("active", activeTab === "Vu");
      document.getElementById("tabAVoir").classList.toggle("active", activeTab === "A voir");

      renderTable();
    }

    document.getElementById("tabTous").addEventListener("click", () => setActiveTab("Tous"));
    document.getElementById("tabVu").addEventListener("click", () => setActiveTab("Vu"));
    document.getElementById("tabAVoir").addEventListener("click", () => setActiveTab("A voir"));

    document.getElementById("addBtn").addEventListener("click", () => openModal());
    document.getElementById("fetchCoverBtn").addEventListener("click", fetchTMDBCover);
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("deleteBtn").addEventListener("click", deleteCurrentFilm);
    document.getElementById("searchInput").addEventListener("input", renderTable);
    document.getElementById("resetFiltersBtn").addEventListener("click", () => { resetFilters(); renderTable(); });

    categoryInput.addEventListener("change", updateCategoryFields);
    form.addEventListener("submit", submitFilm);

    tableContainer.addEventListener("click", e => {
      const row = e.target.closest("tr[data-id]");
      if (!row) return;
      const film = films.find(f => f.id === row.dataset.id);
      if (film) openModal(film);
    });

    renderTable();
    renderStats();
    renderLatest();
  </script>
</body>
</html>
